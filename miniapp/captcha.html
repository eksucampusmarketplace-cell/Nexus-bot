<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Bot - CAPTCHA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #fff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--tg-theme-button-color, #e94560);
        }
        
        .subtitle {
            color: var(--tg-theme-hint-color, #8b9dc3);
            margin-bottom: 24px;
            font-size: 14px;
        }
        
        .captcha-box {
            background: var(--tg-theme-bg-color, #0f3460);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .challenge-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--tg-theme-text-color, #fff);
        }
        
        .math-problem {
            font-size: 32px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #e94560);
            margin: 16px 0;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        
        .option-btn {
            background: var(--tg-theme-button-color, #e94560);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        
        .option-btn:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }
        
        .option-btn:active {
            transform: scale(0.95);
        }
        
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 16px;
        }
        
        .emoji-btn {
            background: var(--tg-theme-bg-color, #0f3460);
            border: 2px solid transparent;
            padding: 12px;
            border-radius: 12px;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .emoji-btn:hover {
            border-color: var(--tg-theme-button-color, #e94560);
            background: var(--tg-theme-secondary-bg-color, #16213e);
        }
        
        .input-box {
            margin-top: 16px;
        }
        
        .input-box input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid var(--tg-theme-button-color, #e94560);
            background: var(--tg-theme-bg-color, #0f3460);
            color: var(--tg-theme-text-color, #fff);
            font-size: 18px;
            text-align: center;
        }
        
        .input-box input:focus {
            outline: none;
            border-color: var(--tg-theme-text-color, #fff);
        }
        
        .submit-btn {
            width: 100%;
            background: var(--tg-theme-button-color, #e94560);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 16px;
            cursor: pointer;
        }
        
        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .timer {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #8b9dc3);
            margin-top: 16px;
        }
        
        .timer.warning {
            color: #ff6b6b;
            font-weight: bold;
        }
        
        .mode-indicator {
            display: inline-block;
            padding: 6px 12px;
            background: var(--tg-theme-button-color, #e94560);
            color: var(--tg-theme-button-text-color, #fff);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 16px;
        }
        
        .word-scramble {
            font-size: 28px;
            letter-spacing: 8px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #e94560);
            margin: 16px 0;
        }
        
        .sequence-box {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 16px 0;
            flex-wrap: wrap;
        }
        
        .sequence-item {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--tg-theme-bg-color, #0f3460);
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
        }
        
        .sequence-item.missing {
            border: 2px dashed var(--tg-theme-button-color, #e94560);
            background: transparent;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--tg-theme-bg-color, #0f3460);
            border-radius: 2px;
            margin-top: 16px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--tg-theme-button-color, #e94560);
            transition: width 1s linear;
        }
        
        .hidden {
            display: none !important;
        }
        
        .success-message {
            color: #4ade80;
            font-size: 18px;
            font-weight: 600;
        }
        
        .error-message {
            color: #f87171;
            font-size: 14px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-indicator" id="modeIndicator">Button</div>
        
        <h1>🤖 Verification Required</h1>
        <p class="subtitle">Complete the challenge to join this group</p>
        
        <div class="captcha-box" id="captchaBox">
            <!-- Dynamic content based on mode -->
            <div id="challengeContent"></div>
        </div>
        
        <div class="timer" id="timer">Time remaining: 60s</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 100%"></div>
        </div>
        
        <div id="errorMessage" class="error-message hidden"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Parse URL params
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode') || 'button';
        const challengeId = params.get('challenge_id');
        const userId = params.get('user_id');
        const chatId = params.get('chat_id');
        
        // Challenge configurations
        const challenges = {
            button: {
                title: "Button",
                render: renderButtonChallenge
            },
            math: {
                title: "Math",
                render: renderMathChallenge
            },
            emoji: {
                title: "Emoji",
                render: renderEmojiChallenge
            },
            word_scramble: {
                title: "Word Scramble",
                render: renderWordScrambleChallenge
            },
            odd_one_out: {
                title: "Odd One Out",
                render: renderOddOneOutChallenge
            },
            number_sequence: {
                title: "Number Sequence",
                render: renderNumberSequenceChallenge
            }
        };
        
        let timeLeft = 60;
        let timerInterval;
        let currentAnswer = null;
        
        function init() {
            document.getElementById('modeIndicator').textContent = 
                challenges[mode]?.title || 'Button';
            
            if (challenges[mode]) {
                challenges[mode].render();
            } else {
                renderButtonChallenge();
            }
            
            startTimer();
        }
        
        function startTimer() {
            const totalTime = 60;
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = `Time remaining: ${timeLeft}s`;
                document.getElementById('progressBar').style.width = `${(timeLeft / totalTime) * 100}%`;
                
                if (timeLeft <= 10) {
                    document.getElementById('timer').classList.add('warning');
                }
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showError('Time expired! Please request a new challenge.');
                }
            }, 1000);
        }
        
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.remove('hidden');
        }
        
        function submitAnswer(answer) {
            // Send answer to bot via WebAppData
            const data = JSON.stringify({
                action: 'captcha_verify',
                challenge_id: challengeId,
                user_id: userId,
                chat_id: chatId,
                answer: answer,
                mode: mode
            });
            
            tg.sendData(data);
            
            // Show success
            document.getElementById('captchaBox').innerHTML = 
                '<div class="success-message">✅ Verifying...</div>';
        }
        
        // Challenge renderers
        function renderButtonChallenge() {
            const content = document.getElementById('challengeContent');
            content.innerHTML = `
                <div class="challenge-text">Click the button below to verify you're human</div>
                <button class="submit-btn" onclick="submitAnswer('verified')">✅ I'm not a robot</button>
            `;
        }
        
        function renderMathChallenge() {
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            const operations = ['+', '-'];
            const op = operations[Math.floor(Math.random() * operations.length)];
            
            let answer;
            if (op === '+') answer = num1 + num2;
            else answer = num1 - num2;
            
            currentAnswer = answer.toString();
            
            // Generate options
            const options = [answer];
            while (options.length < 4) {
                const fake = answer + Math.floor(Math.random() * 10) - 5;
                if (!options.includes(fake) && fake >= 0) options.push(fake);
            }
            options.sort(() => Math.random() - 0.5);
            
            const content = document.getElementById('challengeContent');
            content.innerHTML = `
                <div class="challenge-text">Solve this problem:</div>
                <div class="math-problem">${num1} ${op} ${num2} = ?</div>
                <div class="options-grid">
                    ${options.map(opt => `
                        <button class="option-btn" onclick="submitAnswer('${opt}')">${opt}</button>
                    `).join('')}
                </div>
            `;
        }
        
        function renderEmojiChallenge() {
            const emojis = ['🐱', '🐶', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', 
                           '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔'];
            const target = emojis[Math.floor(Math.random() * emojis.length)];
            
            // Create grid with target appearing multiple times
            const grid = [];
            for (let i = 0; i < 8; i++) {
                grid.push(target);
            }
            for (let i = 0; i < 8; i++) {
                let randomEmoji;
                do {
                    randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
                } while (randomEmoji === target);
                grid.push(randomEmoji);
            }
            grid.sort(() => Math.random() - 0.5);
            
            currentAnswer = target;
            
            const content = document.getElementById('challengeContent');
            content.innerHTML = `
                <div class="challenge-text">Find and click the <b>${target}</b> emoji</div>
                <div class="emoji-grid">
                    ${grid.map(emoji => `
                        <button class="emoji-btn" onclick="submitAnswer('${emoji}')">${emoji}</button>
                    `).join('')}
                </div>
            `;
        }
        
        function renderWordScrambleChallenge() {
            const words = ['NEXUS', 'GROUP', 'MEMBER', 'SAFETY', 'VERIFY', 'HUMAN', 'SECURE'];
            const word = words[Math.floor(Math.random() * words.length)];
            const scrambled = word.split('').sort(() => Math.random() - 0.5).join('');
            
            currentAnswer = word;
            
            const content = document.getElementById('challengeContent');
            content.innerHTML = `
                <div class="challenge-text">Unscramble this word:</div>
                <div class="word-scramble">${scrambled}</div>
                <div class="input-box">
                    <input type="text" id="wordInput" placeholder="Your answer" maxlength="20">
                </div>
                <button class="submit-btn" onclick="submitAnswer(document.getElementById('wordInput').value.toUpperCase())">Submit</button>
            `;
            
            document.getElementById('wordInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    submitAnswer(e.target.value.toUpperCase());
                }
            });
        }
        
        function renderOddOneOutChallenge() {
            const categories = [
                { odd: '🐕', others: ['🐈', '🐱', '🐆', '🐅', '🦁', '🐯', '🐆'] },
                { odd: '🍎', others: ['🥕', '🥦', '🌽', '🥬', '🥒', '🥕', '🥦'] },
                { odd: '🔴', others: ['🔵', '🟢', '🟡', '🟣', '🔵', '🟢', '🟡'] },
            ];
            
            const category = categories[Math.floor(Math.random() * categories.length)];
            const items = [...category.others.slice(0, 7), category.odd];
            items.sort(() => Math.random() - 0.5);
            
            currentAnswer = category.odd;
            
            const content = document.getElementById('challengeContent');
            content.innerHTML = `
                <div class="challenge-text">Find the odd one out:</div>
                <div class="emoji-grid" style="grid-template-columns: repeat(4, 1fr);">
                    ${items.map(item => `
                        <button class="emoji-btn" onclick="submitAnswer('${item}')">${item}</button>
                    `).join('')}
                </div>
            `;
        }
        
        function renderNumberSequenceChallenge() {
            const sequences = [
                { seq: [2, 4, 6, 8, '?', 12], answer: '10', pattern: 'Add 2' },
                { seq: [1, 3, 5, 7, '?', 11], answer: '9', pattern: 'Add 2 (odd numbers)' },
                { seq: [10, 8, 6, 4, '?', 0], answer: '2', pattern: 'Subtract 2' },
                { seq: [1, 2, 4, 8, '?', 32], answer: '16', pattern: 'Multiply by 2' },
                { seq: [3, 6, 9, 12, '?', 18], answer: '15', pattern: 'Add 3' },
            ];
            
            const seqData = sequences[Math.floor(Math.random() * sequences.length)];
            currentAnswer = seqData.answer;
            
            // Generate wrong options
            const options = [parseInt(seqData.answer)];
            while (options.length < 4) {
                const fake = parseInt(seqData.answer) + Math.floor(Math.random() * 10) - 5;
                if (!options.includes(fake) && fake > 0) options.push(fake);
            }
            options.sort(() => Math.random() - 0.5);
            
            const content = document.getElementById('challengeContent');
            content.innerHTML = `
                <div class="challenge-text">Complete the sequence:</div>
                <div class="sequence-box">
                    ${seqData.seq.map(n => `
                        <div class="sequence-item ${n === '?' ? 'missing' : ''}">${n}</div>
                    `).join('')}
                </div>
                <div class="options-grid">
                    ${options.map(opt => `
                        <button class="option-btn" onclick="submitAnswer('${opt}')">${opt}</button>
                    `).join('')}
                </div>
            `;
        }
        
        // Initialize
        init();
    </script>
</body>
</html>
