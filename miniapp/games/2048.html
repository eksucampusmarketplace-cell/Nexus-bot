<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2048</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0f;--card:#131318;--border:#1e1e28;--text:#e8edf7;--muted:#4a5070;--r:10px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;user-select:none}
.app{display:flex;flex-direction:column;align-items:center;height:100dvh;padding:14px;gap:10px}
.header{width:100%;display:flex;align-items:center;justify-content:space-between}
.title{font-size:22px;font-weight:900;letter-spacing:-1px;color:#f59e0b}
.scores{display:flex;gap:8px}
.score-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px 14px;text-align:center;min-width:60px}
.score-val{font-size:17px;font-weight:800}
.score-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.new-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--text);cursor:pointer}
.hint{font-size:12px;color:var(--muted);text-align:center}

/* Board */
.board-wrap{display:flex;align-items:center;justify-content:center;flex:1;width:100%}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px;background:#1a1a22;border-radius:14px;width:min(360px,100%)}
.cell{aspect-ratio:1;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-weight:900;transition:background .1s}
.cell[data-val="0"]{background:#222230}
.cell[data-val="2"]{background:#3b4268;color:#c7d2f0;font-size:clamp(16px,5vw,26px)}
.cell[data-val="4"]{background:#4a3b6e;color:#d4c7f0;font-size:clamp(16px,5vw,26px)}
.cell[data-val="8"]{background:#6e3b3b;color:#f0c7c7;font-size:clamp(14px,5vw,24px)}
.cell[data-val="16"]{background:#6e4f3b;color:#f0d4c7;font-size:clamp(14px,5vw,22px)}
.cell[data-val="32"]{background:#6e6e3b;color:#f0f0c7;font-size:clamp(12px,4.5vw,20px)}
.cell[data-val="64"]{background:#3b6e3b;color:#c7f0c7;font-size:clamp(12px,4.5vw,20px)}
.cell[data-val="128"]{background:#3b6e6e;color:#c7f0f0;font-size:clamp(11px,4vw,18px)}
.cell[data-val="256"]{background:#3b3b6e;color:#c7c7f0;font-size:clamp(10px,3.5vw,17px)}
.cell[data-val="512"]{background:#6e3b6e;color:#f0c7f0;font-size:clamp(10px,3.5vw,17px)}
.cell[data-val="1024"]{background:#7e4a28;color:#fde68a;font-size:clamp(9px,3vw,15px)}
.cell[data-val="2048"]{background:#f59e0b;color:#000;font-size:clamp(9px,3vw,15px);box-shadow:0 0 20px #f59e0b88;animation:pulse2048 .5s ease}
@keyframes pulse2048{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes appear{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.cell-new{animation:appear .15s ease}
@keyframes merge{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.cell-merge{animation:merge .15s ease}

.overlay{position:fixed;inset:0;background:#000b;backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:50}
.ov-card{background:#131318;border:1px solid #1e1e28;border-radius:20px;padding:28px 24px;text-align:center;width:min(280px,88vw)}
.ov-icon{font-size:52px;margin-bottom:8px}
.ov-title{font-size:22px;font-weight:800;margin-bottom:4px}
.ov-score{font-size:40px;font-weight:800;color:#f59e0b;margin:8px 0}
.ov-sub{font-size:13px;color:var(--muted);margin-bottom:6px}
.ov-xp{font-size:15px;font-weight:700;color:#f59e0b;margin-bottom:20px}
.ov-btn{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;font-size:15px;font-weight:700;background:linear-gradient(135deg,#f59e0b,#d97706);color:#000}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box"><div class="score-val" id="score">0</div><div class="score-lbl">Score</div></div>
      <div class="score-box"><div class="score-val" id="best">0</div><div class="score-lbl">Best</div></div>
    </div>
    <button class="new-btn" onclick="initGame()">New</button>
  </div>
  <div class="hint">Swipe to merge tiles → reach 2048!</div>
  <div class="board-wrap"><div class="board" id="board"></div></div>
</div>

<div class="overlay" id="over-ov" style="display:none">
  <div class="ov-card">
    <div class="ov-icon" id="ov-icon">🏆</div>
    <div class="ov-title" id="ov-title">Game Over</div>
    <div class="ov-score" id="ov-score">0</div>
    <div class="ov-sub" id="ov-sub">Score</div>
    <div class="ov-xp" id="ov-xp">+0 XP</div>
    <button class="ov-btn" onclick="initGame()">New Game</button>
  </div>
</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.expand();tg.ready();}
const player=tg?.initDataUnsafe?.user||{id:0,first_name:'Player'};
const chatId=new URLSearchParams(location.search).get('chat_id')||'0';

let grid,score,best=parseInt(localStorage.getItem('2048_best')||'0'),won=false;
document.getElementById('best').textContent=best;

function initGame(){
  document.getElementById('over-ov').style.display='none';
  grid=Array(4).fill(0).map(()=>Array(4).fill(0));
  score=0;won=false;
  document.getElementById('score').textContent='0';
  addTile();addTile();
  render();
}

function addTile(){
  const empty=[];
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(grid[r][c]===0)empty.push([r,c]);
  if(!empty.length) return false;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
  return true;
}

function render(newPos=null,mergePos=null){
  const board=document.getElementById('board');
  board.innerHTML='';
  for(let r=0;r<4;r++){
    for(let c=0;c<4;c++){
      const v=grid[r][c];
      const cell=document.createElement('div');
      cell.className='cell';
      if(newPos&&newPos.some(p=>p[0]===r&&p[1]===c)) cell.classList.add('cell-new');
      if(mergePos&&mergePos.some(p=>p[0]===r&&p[1]===c)) cell.classList.add('cell-merge');
      cell.dataset.val=v;
      cell.textContent=v||'';
      board.appendChild(cell);
    }
  }
}

function slide(row){
  const filtered=row.filter(v=>v!==0);
  const merged=[];
  const mergedIdx=[];
  let i=0;
  while(i<filtered.length){
    if(i+1<filtered.length&&filtered[i]===filtered[i+1]){
      const val=filtered[i]*2;
      merged.push(val);
      mergedIdx.push(merged.length-1);
      score+=val;
      i+=2;
    } else {merged.push(filtered[i]);i++;}
  }
  while(merged.length<4) merged.push(0);
  return{row:merged,mergedIdx};
}

function move(dir){
  let changed=false;
  const mergePositions=[];
  let newGrid=grid.map(r=>[...r]);

  function processRows(g){
    const res=[];const mi=[];
    for(let r=0;r<4;r++){
      const {row,mergedIdx}=slide(g[r]);
      if(row.join()!==g[r].join()) changed=true;
      mergedIdx.forEach(c=>mi.push([r,c]));
      res.push(row);
    }
    return{grid:res,mi};
  }
  function transpose(g){return g[0].map((_,c)=>g.map(r=>r[c]));}
  function reverseRows(g){return g.map(r=>[...r].reverse());}

  if(dir==='left'){const{grid:g,mi}=processRows(newGrid);newGrid=g;mergePositions.push(...mi);}
  else if(dir==='right'){const{grid:g,mi}=processRows(reverseRows(newGrid));newGrid=reverseRows(g);mi.forEach(([r,c])=>mergePositions.push([r,3-c]));}
  else if(dir==='up'){const t=transpose(newGrid);const{grid:g,mi}=processRows(t);newGrid=transpose(g);mi.forEach(([r,c])=>mergePositions.push([c,r]));}
  else if(dir==='down'){const t=reverseRows(transpose(newGrid));const{grid:g,mi}=processRows(t);const nt=transpose(reverseRows(g));newGrid=nt;mi.forEach(([r,c])=>mergePositions.push([3-c,r]));}

  if(!changed) return;
  grid=newGrid;
  document.getElementById('score').textContent=score;
  if(score>best){best=score;localStorage.setItem('2048_best',best);document.getElementById('best').textContent=best;}
  tg?.HapticFeedback?.selectionChanged();

  const newPos=[];
  if(!addTile()) {checkGameOver();return;}
  for(let r=0;r<4;r++)for(let c=0;c<4;c++)if(grid[r][c]===2||grid[r][c]===4)newPos.push([r,c]);

  if(!won&&grid.flat().includes(2048)){
    won=true;
    tg?.HapticFeedback?.notificationOccurred('success');
    setTimeout(()=>{
      document.getElementById('ov-icon').textContent='🏆';
      document.getElementById('ov-title').textContent='You reached 2048!';
      document.getElementById('ov-score').textContent=score;
      document.getElementById('ov-sub').textContent='Incredible!';
      document.getElementById('ov-xp').textContent=`+500 XP Earned`;
      document.getElementById('over-ov').style.display='flex';
      submitScore(500);
      saveLeaderboard(score,500);
    },400);
    return;
  }
  render(newPos,mergePositions);
}

function checkGameOver(){
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){
    if(grid[r][c]===0) return;
    if(r<3&&grid[r][c]===grid[r+1][c]) return;
    if(c<3&&grid[r][c]===grid[r][c+1]) return;
  }
  tg?.HapticFeedback?.notificationOccurred('error');
  const xp=Math.floor(score/50);
  document.getElementById('ov-icon').textContent='😔';
  document.getElementById('ov-title').textContent='No more moves!';
  document.getElementById('ov-score').textContent=score;
  document.getElementById('ov-sub').textContent=`Best: ${best}`;
  document.getElementById('ov-xp').textContent=`+${xp} XP Earned`;
  document.getElementById('over-ov').style.display='flex';
  submitScore(xp);
  saveLeaderboard(score,xp);
}

function saveLeaderboard(score,xp){
  const lb=JSON.parse(localStorage.getItem('nexus_2048_lb')||'[]');
  lb.push({name:player.first_name||'Player',score,xp,date:Date.now()});
  lb.sort((a,b)=>b.score-a.score);
  localStorage.setItem('nexus_2048_lb',JSON.stringify(lb.slice(0,10)));
}

let sx=0,sy=0;
document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.max(Math.abs(dx),Math.abs(dy))<30) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
},{passive:true});
document.addEventListener('keydown',e=>{
  const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(map[e.key]){e.preventDefault();move(map[e.key]);}
});

async function submitScore(xp){
  if(!chatId||!player.id||xp<=0) return;
  try{await fetch(`/api/groups/${chatId}/xp`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`tma ${tg?.initData||''}`},body:JSON.stringify({user_id:player.id,xp})});}catch(e){}
}

initGame();
</script>
</body>
</html>
