<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#080c18;--card:#0f1620;--border:#1a2840;--text:#e8edf7;--muted:#4a6080;--r:14px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;user-select:none}
.app{display:flex;flex-direction:column;align-items:center;height:100dvh;padding:16px 14px;gap:12px}
.header{width:100%;display:flex;align-items:center;justify-content:space-between}
.title{font-size:18px;font-weight:800}
.stats{display:flex;gap:8px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px 14px;text-align:center}
.stat-val{font-size:18px;font-weight:800}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase}

/* Emoji display */
.emoji-card{width:100%;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:8px}
.emoji-display{font-size:clamp(48px,15vw,80px);line-height:1.1;letter-spacing:4px}
.emoji-hint{font-size:12px;color:var(--muted)}

/* Progress bar */
.prog-bar{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:#f59e0b;transition:width .3s}

/* Options grid */
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;flex:1;align-content:start}
.opt-btn{padding:12px 10px;background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;transition:.15s;text-align:left;font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.opt-btn:active{transform:scale(.97)}
.opt-btn.correct{background:#22c55e20;border-color:#22c55e;color:#22c55e}
.opt-btn.wrong{background:#ef444420;border-color:#ef4444;color:#ef4444}
.opt-btn.disabled{pointer-events:none}

/* Score flash */
.score-flash{width:100%;text-align:center;font-size:16px;font-weight:700;min-height:28px;transition:.3s}

/* Category */
.cat-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;background:var(--border);border-radius:20px;font-size:11px;color:var(--muted);font-weight:600}

/* Timer ring */
.timer-ring{position:relative;width:48px;height:48px;flex-shrink:0}
.timer-ring canvas{position:absolute;top:0;left:0}
.timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:15px;font-weight:700}

.overlay{position:fixed;inset:0;background:#000b;backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:50}
.ov-card{background:#0f1620;border:1px solid #1a2840;border-radius:20px;padding:28px 24px;text-align:center;width:min(300px,88vw)}
.ov-icon{font-size:52px;margin-bottom:8px}
.ov-title{font-size:22px;font-weight:800;margin-bottom:4px}
.ov-score{font-size:40px;font-weight:800;color:#f59e0b;margin:8px 0}
.ov-sub{font-size:13px;color:#4a6080;margin-bottom:6px}
.ov-xp{font-size:15px;font-weight:700;color:#f59e0b;margin-bottom:20px}
.ov-btn{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;font-size:15px;font-weight:700;background:linear-gradient(135deg,#f59e0b,#d97706);color:#000}
</style>
</head>

<div class="app">

</div>

  tc.clearRect(0,0,48,48);
  tc.beginPath();tc.arc(24,24,20,0,Math.PI*2);tc.strokeStyle='#1a2840';tc.lineWidth=4;tc.stroke();
  tc.beginPath();tc.arc(24,24,20,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);
  tc.strokeStyle=urgent?'#ef4444':'#f59e0b';tc.lineWidth=4;tc.lineCap='round';tc.stroke();
}

function loadQuestion(){
  if(current>=TOTAL){showOver();return;}
  const q=questions[current];
  answered=false;
  document.getElementById('prog').style.width=(current/TOTAL*100)+'%';
  document.getElementById('cat-pill').textContent=q.cat;
  document.getElementById('emoji-display').textContent=q.emoji;
  document.getElementById('hint').textContent=`Round ${current+1} of ${TOTAL}`;
  document.getElementById('score-flash').textContent='';
  document.getElementById('score-flash').style.color='';

  const opts=shuffle(q.opts);
  const optEl=document.getElementById('options');
  optEl.innerHTML='';
  opts.forEach(opt=>{
    const b=document.createElement('button');
    b.className='opt-btn';
    b.textContent=opt;
    b.onclick=()=>answer(opt,q.answer,b,opts,q);
    optEl.appendChild(b);
  });

  clearInterval(timerInt);timeLeft=15;
  drawTimer(1,false);document.getElementById('timer-num').textContent=15;
  timerInt=setInterval(()=>{
    timeLeft--;
    drawTimer(timeLeft/15,timeLeft<=5);
    document.getElementById('timer-num').textContent=timeLeft;
    if(timeLeft<=0){clearInterval(timerInt);timeOut(q);}
  },1000);
}

function answer(selected,correct,btn,allOpts,q){
  if(answered) return;
  answered=true;clearInterval(timerInt);
  const tb=Math.floor(timeLeft/15*50);
  document.querySelectorAll('.opt-btn').forEach(b=>{b.classList.add('disabled');if(b.textContent===correct)b.classList.add('correct');});
  if(selected===correct){
    streak++;maxStreak=Math.max(maxStreak,streak);
    const mult=Math.min(Math.floor(streak/3)+1,4);
    const pts=100+tb+(streak>1?(streak-1)*20:0);
    score+=pts*mult;
    document.getElementById('score-val').textContent=score;
    btn.classList.add('correct');
    document.getElementById('score-flash').textContent=`✓ +${pts*mult} pts ${mult>1?'('+mult+'x)':''}`;
    document.getElementById('score-flash').style.color='#22c55e';
    tg?.HapticFeedback?.notificationOccurred('success');
  } else {
    streak=0;btn.classList.add('wrong');
    document.getElementById('score-flash').textContent=`✗ Answer: ${correct}`;
    document.getElementById('score-flash').style.color='#ef4444';
    tg?.HapticFeedback?.notificationOccurred('error');
  }
  setTimeout(()=>{current++;loadQuestion();},1100);
}

function timeOut(q){
  if(answered) return;
  answered=true;streak=0;
  document.querySelectorAll('.opt-btn').forEach(b=>{b.classList.add('disabled');if(b.textContent===q.answer)b.classList.add('correct');});
  document.getElementById('score-flash').textContent=`⏱ Time up! Answer: ${q.answer}`;
  document.getElementById('score-flash').style.color='#f59e0b';
  tg?.HapticFeedback?.notificationOccurred('warning');
  setTimeout(()=>{current++;loadQuestion();},1200);
}

function startGame(){
  document.getElementById('start-ov').style.display='none';
  document.getElementById('over-ov').style.display='none';
  questions=shuffle(PUZZLES).slice(0,TOTAL);
  current=0;score=0;streak=0;maxStreak=0;
  document.getElementById('score-val').textContent='0';
  loadQuestion();
}

function showOver(){
  clearInterval(timerInt);
  const xp=Math.round(score/8);
  document.getElementById('ov-icon').textContent=score>1200?'🏆':score>800?'🎭':'😅';
  document.getElementById('ov-title').textContent=score>1200?'Emoji Master!':score>800?'Great Guesser!':'Keep Practicing!';
  document.getElementById('ov-score').textContent=score+' pts';
  document.getElementById('ov-sub').textContent=`Best streak: ${maxStreak} 🔥`;
  document.getElementById('ov-xp').textContent=`+${xp} XP Earned`;
  document.getElementById('over-ov').style.display='flex';
  submitScore(xp);
  saveLeaderboard(score,xp);
}

function saveLeaderboard(score,xp){
  const lb=JSON.parse(localStorage.getItem('nexus_emoji_lb')||'[]');
  lb.push({name:player.first_name||'Player',score,xp,date:Date.now()});
  lb.sort((a,b)=>b.score-a.score);
  localStorage.setItem('nexus_emoji_lb',JSON.stringify(lb.slice(0,10)));
}

async function submitScore(xp){
  if(!chatId||!player.id||xp<=0) return;
  try{await fetch(`/api/groups/${chatId}/xp`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`tma ${tg?.initData||''}`},body:JSON.stringify({user_id:player.id,xp})});}catch(e){}
}
</script>
