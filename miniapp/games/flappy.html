<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#080c18;overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent;font-family:-apple-system,sans-serif}
.app{display:flex;flex-direction:column;align-items:center;height:100dvh}
canvas{display:block;touch-action:none}
.ui-bar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;position:absolute;top:0;left:0;z-index:10;pointer-events:none}
.score-display{font-size:32px;font-weight:900;color:#fff;text-shadow:0 2px 8px #00000099;font-variant-numeric:tabular-nums;pointer-events:none}
.best-display{font-size:14px;font-weight:700;color:#ffffffaa;text-shadow:0 1px 4px #00000099}

.overlay{position:fixed;inset:0;background:#000b;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:50}
.ov-card{background:#0f1620;border:1px solid #1a2840;border-radius:20px;padding:28px 24px;text-align:center;width:min(280px,88vw)}
.ov-icon{font-size:52px;margin-bottom:8px}
.ov-title{font-size:22px;font-weight:800;color:#e8edf7;margin-bottom:4px}
.ov-score{font-size:42px;font-weight:900;color:#f59e0b;margin:8px 0}
.ov-best{font-size:13px;color:#4a6080;margin-bottom:4px}
.ov-xp{font-size:15px;font-weight:700;color:#22c55e;margin-bottom:20px}
.ov-btn{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;font-size:16px;font-weight:800;background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;letter-spacing:.5px}
.ov-btn:active{transform:scale(.97)}
</style>
</head>
<body>
<div class="app">
  <div style="width:100%;padding:8px 16px;position:absolute;top:0;left:0;z-index:10;">
    <a href="../games.html" style="display:inline-flex;align-items:center;gap:6px;color:#ffffffaa;text-decoration:none;font-size:13px;padding:4px 0;text-shadow:0 1px 4px #00000099;">
      ← Back to Games
    </a>
  </div>
  <div class="ui-bar" style="top:32px;">
    <div class="score-display" id="score-display">0</div>
    <div class="best-display" id="best-display">Best: 0</div>
  </div>
  <canvas id="c"></canvas>
</div>

<div class="overlay" id="start-ov">
  <div class="ov-card">
    <div class="ov-icon">🐦</div>
    <div class="ov-title">Flappy Bird</div>
    <div style="font-size:13px;color:#4a6080;margin:8px 0 20px">Tap to flap through the pipes. Don't crash!</div>
    <button class="ov-btn" style="background:linear-gradient(135deg,#3b82f6,#1d4ed8)" onclick="startGame()">Tap to Fly!</button>
  </div>
</div>
<div class="overlay" id="over-ov" style="display:none">
  <div class="ov-card">
    <div class="ov-icon" id="ov-icon">💥</div>
    <div class="ov-title" id="ov-title">Crashed!</div>
    <div class="ov-score" id="ov-score">0</div>
    <div class="ov-best" id="ov-best">Best: 0</div>
    <div class="ov-xp" id="ov-xp">+0 XP</div>
    <button class="ov-btn" onclick="restartGame()">Fly Again</button>
  </div>
</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.expand();tg.ready();}
const player=tg?.initDataUnsafe?.user||{id:0,first_name:'Player'};
const chatId=new URLSearchParams(location.search).get('chat_id')||'0';

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();

let best=parseInt(localStorage.getItem('flappy_best')||'0');
document.getElementById('best-display').textContent='Best: '+best;

let bird,pipes,score,running,raf,frameCount;
const GRAVITY=0.45,FLAP=-8.5,PIPE_W=60,PIPE_GAP=140,PIPE_SPEED=2.8;

function Bird(){
  const size=32;
  return{x:canvas.width*0.25,y:canvas.height/2,vy:0,size,rotation:0,
    flap(){this.vy=FLAP;tg?.HapticFeedback?.impactOccurred('light');},
    update(){
      this.vy+=GRAVITY;
      this.y+=this.vy;
      this.rotation=Math.min(Math.max(this.vy*4,-30),90);
    },
    draw(){
      ctx.save();
      ctx.translate(this.x,this.y);
      ctx.rotate(this.rotation*Math.PI/180);
      ctx.fillStyle='#f59e0b';
      ctx.beginPath();ctx.ellipse(0,0,this.size/2,this.size/2.5,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#d97706';
      ctx.beginPath();ctx.ellipse(-4,4,this.size/3,this.size/4.5,-.4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(8,-4,6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';ctx.beginPath();ctx.arc(10,-4,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(11,-5,1,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ef4444';
      ctx.beginPath();ctx.moveTo(14,0);ctx.lineTo(22,2);ctx.lineTo(14,5);ctx.closePath();ctx.fill();
      ctx.restore();
    },
    dead(){return this.y-this.size/2<0||this.y+this.size/2>canvas.height;}
  };
}

function makePipe(x){
  const gap=PIPE_GAP;
  const minH=80,maxH=canvas.height-gap-80;
  const topH=minH+Math.random()*(maxH-minH);
  return{x,topH,botY:topH+gap,passed:false};
}

function drawPipe(p){
  const w=PIPE_W,r=8;
  const grad=ctx.createLinearGradient(p.x,0,p.x+w,0);
  grad.addColorStop(0,'#22c55e');grad.addColorStop(.5,'#16a34a');grad.addColorStop(1,'#15803d');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.roundRect(p.x,0,w,p.topH-12,r);ctx.fill();
  ctx.fillStyle='#16a34a';
  ctx.beginPath();ctx.roundRect(p.x-6,p.topH-28,w+12,28,r);ctx.fill();
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.roundRect(p.x,p.botY+12,w,canvas.height-p.botY-12,r);ctx.fill();
  ctx.fillStyle='#16a34a';
  ctx.beginPath();ctx.roundRect(p.x-6,p.botY,w+12,28,r);ctx.fill();
}

function drawBg(){
  const sky=ctx.createLinearGradient(0,0,0,canvas.height);
  sky.addColorStop(0,'#0a1628');sky.addColorStop(1,'#0f2040');
  ctx.fillStyle=sky;ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='rgba(255,255,255,0.4)';
  for(let i=0;i<40;i++){
    const sx=(i*137.5)%canvas.width,sy=(i*73.1)%canvas.height*0.7;
    const sr=i%3===0?1.5:0.8;
    ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='#1a2840';
  ctx.fillRect(0,canvas.height-30,canvas.width,30);
  ctx.fillStyle='#22c55e';
  ctx.fillRect(0,canvas.height-32,canvas.width,4);
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBg();
  frameCount++;

  if(frameCount%Math.max(90,120-score*2)===0){
    pipes.push(makePipe(canvas.width+10));
  }

  for(let i=pipes.length-1;i>=0;i--){
    const p=pipes[i];
    p.x-=PIPE_SPEED+(score*0.05);
    drawPipe(p);
    if(!p.passed&&p.x+PIPE_W<bird.x){
      p.passed=true;score++;
      document.getElementById('score-display').textContent=score;
      tg?.HapticFeedback?.selectionChanged();
    }
    const bx=bird.x,by=bird.y,br=bird.size/2-4;
    if(bx+br>p.x&&bx-br<p.x+PIPE_W){
      if(by-br<p.topH||by+br>p.botY){gameOver();return;}
    }
    if(p.x+PIPE_W<0) pipes.splice(i,1);
  }

  bird.update();
  bird.draw();
  if(bird.dead()){gameOver();return;}
  raf=requestAnimationFrame(loop);
}

function startGame(){
  document.getElementById('start-ov').style.display='none';
  bird=Bird();pipes=[];score=0;frameCount=0;running=true;
  document.getElementById('score-display').textContent='0';
  raf=requestAnimationFrame(loop);
}

function restartGame(){
  document.getElementById('over-ov').style.display='none';
  bird=Bird();pipes=[];score=0;frameCount=0;running=true;
  document.getElementById('score-display').textContent='0';
  raf=requestAnimationFrame(loop);
}

function gameOver(){
  running=false;cancelAnimationFrame(raf);
  tg?.HapticFeedback?.notificationOccurred('error');
  if(score>best){best=score;localStorage.setItem('flappy_best',best);}
  document.getElementById('best-display').textContent='Best: '+best;
  const xp=score*8;
  document.getElementById('ov-icon').textContent=score>20?'🏆':score>10?'🐦':'💥';
  document.getElementById('ov-title').textContent=score>20?'Incredible!':score>10?'Nice Flight!':'Crashed!';
  document.getElementById('ov-score').textContent=score;
  document.getElementById('ov-best').textContent='Best: '+best;
  document.getElementById('ov-xp').textContent=`+${xp} XP Earned`;
  document.getElementById('over-ov').style.display='flex';
  submitScore(xp);
  saveLeaderboard(score,xp);
}

function saveLeaderboard(score,xp){
  const lb=JSON.parse(localStorage.getItem('nexus_flappy_lb')||'[]');
  lb.push({name:player.first_name||'Player',score,xp,date:Date.now()});
  lb.sort((a,b)=>b.score-a.score);
  localStorage.setItem('nexus_flappy_lb',JSON.stringify(lb.slice(0,10)));
}

function flap(){if(running) bird.flap();}
canvas.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});
canvas.addEventListener('mousedown',flap);
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();flap();}});

async function submitScore(xp){
  if(!chatId||!player.id||xp<=0) return;
  try{await fetch(`/api/groups/${chatId}/xp`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`tma ${tg?.initData||''}`},body:JSON.stringify({user_id:player.id,xp})});}catch(e){}
}
</script>
</body>
</html>
