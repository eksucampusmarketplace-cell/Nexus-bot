<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Minesweeper</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#08090f;--card:#0f1015;--border:#1a1a25;--text:#e8edf7;--muted:#4a5070;--r:8px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;overflow:hidden;user-select:none}
.app{display:flex;flex-direction:column;align-items:center;height:100dvh;padding:12px 12px;gap:10px}
.header{width:100%;display:flex;align-items:center;justify-content:space-between}
.title{font-size:17px;font-weight:800}
.stats{display:flex;gap:8px;align-items:center}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 12px;text-align:center}
.stat-val{font-size:16px;font-weight:800}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase}

/* Difficulty */
.diff-row{display:flex;gap:6px;width:100%}
.diff-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--card);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:.15s}
.diff-btn.active{background:#22c55e20;border-color:#22c55e50;color:#22c55e}
.diff-btn:active{transform:scale(.97)}

/* Mode toggle */
.mode-row{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r)}
.mode-label{font-size:12px;font-weight:600}
.mode-hint{font-size:11px;color:var(--muted);margin-top:1px}
.flag-toggle{display:flex;gap:6px}
.mode-opt{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:.15s}
.mode-opt.active{background:#ef444420;border-color:#ef444450;color:#ef4444}
.mode-opt.active.reveal{background:#3b82f620;border-color:#3b82f650;color:#3b82f6}

/* Grid */
.grid-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;overflow:hidden}
.mine-grid{display:grid;gap:3px}
.cell{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;cursor:pointer;transition:.1s;border:1px solid transparent;position:relative}
.cell:active{transform:scale(.9)}
.cell.hidden{background:#1a1a28;border-color:#252535}
.cell.hidden:hover{background:#222235}
.cell.revealed{background:#0a0a12;border-color:#12121e;cursor:default}
.cell.flagged{background:#1a1a28;border-color:#ef444450}
.cell.mine-hit{background:#ef444430;border-color:#ef4444;animation:explode .4s ease}
@keyframes explode{0%{transform:scale(1)}40%{transform:scale(1.3)}100%{transform:scale(1)}}
.cell.revealed.n1{color:#3b82f6}.cell.revealed.n2{color:#22c55e}.cell.revealed.n3{color:#ef4444}
.cell.revealed.n4{color:#a855f7}.cell.revealed.n5{color:#f59e0b}.cell.revealed.n6{color:#14b8a6}
.cell.revealed.n7{color:#ec4899}.cell.revealed.n8{color:#e8edf7}

.overlay{position:fixed;inset:0;background:#000b;backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:50}
.ov-card{background:#0f1015;border:1px solid #1a1a25;border-radius:20px;padding:24px;text-align:center;width:min(280px,88vw)}
.ov-icon{font-size:48px;margin-bottom:8px}
.ov-title{font-size:20px;font-weight:800;margin-bottom:4px}
.ov-time{font-size:36px;font-weight:900;color:#22c55e;margin:8px 0}
.ov-sub{font-size:13px;color:var(--muted);margin-bottom:6px}
.ov-xp{font-size:14px;font-weight:700;color:#f59e0b;margin-bottom:16px}
.ov-btn{width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:700;background:linear-gradient(135deg,#22c55e,#15803d);color:#fff}
</style>
</head>
<body>
<div class="app">
  <div style="width:100%;margin-bottom:4px;">
    <a href="../games.html" style="display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;padding:4px 0;">
      ← Back to Games
    </a>
  </div>
  <div class="header">
    <div class="title">💣 Minesweeper</div>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="mines-left">0</div><div class="stat-lbl">Mines</div></div>
      <div class="stat"><div class="stat-val" id="timer-val" style="color:#f59e0b">0s</div><div class="stat-lbl">Time</div></div>
    </div>
  </div>
  <div class="diff-row">
    <button class="diff-btn active" data-diff="easy" onclick="setDiff('easy')">Easy 9×9</button>
    <button class="diff-btn" data-diff="medium" onclick="setDiff('medium')">Medium 12×9</button>
    <button class="diff-btn" data-diff="hard" onclick="setDiff('hard')">Hard 14×9</button>
  </div>
  <div class="mode-row">
    <div><div class="mode-label">Tap mode</div><div class="mode-hint">Long-press to flag on mobile</div></div>
    <div class="flag-toggle">
      <button class="mode-opt reveal active" onclick="setMode('reveal')">👁 Reveal</button>
      <button class="mode-opt" onclick="setMode('flag')">🚩 Flag</button>
    </div>
  </div>
  <div class="grid-wrap"><div class="mine-grid" id="grid"></div></div>
</div>

<div class="overlay" id="over-ov" style="display:none">
  <div class="ov-card">
    <div class="ov-icon" id="ov-icon">💣</div>
    <div class="ov-title" id="ov-title">Boom!</div>
    <div class="ov-time" id="ov-time">0s</div>
    <div class="ov-sub" id="ov-sub"></div>
    <div class="ov-xp" id="ov-xp">+0 XP</div>
    <button class="ov-btn" onclick="newGame()">New Game</button>
  </div>
</div>

<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.expand();tg.ready();}
const player=tg?.initDataUnsafe?.user||{id:0,first_name:'Player'};
const chatId=new URLSearchParams(location.search).get('chat_id')||'0';

const DIFFS={
  easy:{cols:9,rows:9,mines:10},
  medium:{cols:12,rows:9,mines:20},
  hard:{cols:14,rows:9,mines:30}
};
let diff='easy',mode='reveal',grid=[],revealed,flagged,minePos,started,elapsed,timerInt,W,H,M,gameOver;

function setDiff(d){
  diff=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',b.dataset.diff===d));
  newGame();
}
function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-opt').forEach(b=>{b.classList.toggle('active',b.textContent.includes(m==='reveal'?'Reveal':'Flag'));if(b.classList.contains('active'))b.classList.toggle('reveal',m==='reveal');else b.classList.remove('reveal');});
}

function newGame(){
  document.getElementById('over-ov').style.display='none';
  const cfg=DIFFS[diff];W=cfg.cols;H=cfg.rows;M=cfg.mines;
  revealed=Array(W*H).fill(false);
  flagged=Array(W*H).fill(false);
  minePos=new Set();
  started=false;elapsed=0;gameOver=false;
  clearInterval(timerInt);
  document.getElementById('timer-val').textContent='0s';
  document.getElementById('mines-left').textContent=M;
  buildGrid();
}

function buildGrid(){
  const g=document.getElementById('grid');
  const cellSz=Math.floor((Math.min(window.innerWidth-24,420)-(W-1)*3)/W);
  g.style.gridTemplateColumns=`repeat(${W},${cellSz}px)`;
  g.innerHTML='';
  grid=[];
  for(let i=0;i<W*H;i++){
    const cell=document.createElement('div');
    cell.className='cell hidden';
    cell.dataset.i=i;
    cell.style.fontSize=Math.max(10,cellSz*0.45)+'px';
    cell.onclick=()=>tap(i);
    let pressTimer;
    cell.addEventListener('touchstart',()=>{pressTimer=setTimeout(()=>longPress(i),400);},{passive:true});
    cell.addEventListener('touchend',()=>clearTimeout(pressTimer),{passive:true});
    g.appendChild(cell);
    grid.push(cell);
  }
}

function placeMines(firstIdx){
  const forbidden=neighbors(firstIdx).concat([firstIdx]);
  const candidates=[];
  for(let i=0;i<W*H;i++) if(!forbidden.includes(i)) candidates.push(i);
  for(let n=0;n<M;n++){
    const ri=Math.floor(Math.random()*candidates.length);
    minePos.add(candidates[ri]);
    candidates.splice(ri,1);
  }
}

function neighbors(idx){
  const r=Math.floor(idx/W),c=idx%W,ns=[];
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    if(!dr&&!dc) continue;
    const nr=r+dr,nc=c+dc;
    if(nr>=0&&nr<H&&nc>=0&&nc<W) ns.push(nr*W+nc);
  }
  return ns;
}

function countAdj(idx){return neighbors(idx).filter(n=>minePos.has(n)).length;}

function tap(idx){
  if(gameOver||flagged[idx]) return;
  if(mode==='flag'){toggleFlag(idx);return;}
  if(!started){started=true;placeMines(idx);timerInt=setInterval(()=>{elapsed++;document.getElementById('timer-val').textContent=elapsed+'s';},1000);}
  if(revealed[idx]) return;
  if(minePos.has(idx)){boom(idx);return;}
  floodReveal(idx);
  checkWin();
}

function longPress(idx){tg?.HapticFeedback?.impactOccurred('medium');toggleFlag(idx);}

function toggleFlag(idx){
  if(revealed[idx]) return;
  flagged[idx]=!flagged[idx];
  const cell=grid[idx];
  cell.className='cell '+(flagged[idx]?'flagged':'hidden');
  cell.textContent=flagged[idx]?'🚩':'';
  const flagCount=flagged.filter(Boolean).length;
  document.getElementById('mines-left').textContent=M-flagCount;
  tg?.HapticFeedback?.selectionChanged();
}

function floodReveal(idx){
  const q=[idx];
  while(q.length){
    const cur=q.shift();
    if(revealed[cur]||flagged[cur]) continue;
    revealed[cur]=true;
    const adj=countAdj(cur);
    const cell=grid[cur];
    cell.className=`cell revealed${adj?' n'+adj:''}`;
    cell.textContent=adj||'';
    if(!adj) neighbors(cur).forEach(n=>{if(!revealed[n]&&!minePos.has(n)) q.push(n);});
  }
}

function boom(hitIdx){
  gameOver=true;clearInterval(timerInt);
  tg?.HapticFeedback?.notificationOccurred('error');
  grid[hitIdx].className='cell mine-hit';grid[hitIdx].textContent='💥';
  minePos.forEach(mi=>{if(!revealed[mi]&&!flagged[mi]){grid[mi].textContent='💣';grid[mi].className='cell revealed';}});
  setTimeout(()=>{
    document.getElementById('ov-icon').textContent='💣';
    document.getElementById('ov-title').textContent='Boom! Hit a mine';
    document.getElementById('ov-time').textContent=elapsed+'s';document.getElementById('ov-time').style.color='#ef4444';
    document.getElementById('ov-sub').textContent=`Survived ${elapsed} seconds on ${diff}`;
    document.getElementById('ov-xp').textContent=`+${elapsed*3} XP`;
    document.getElementById('over-ov').style.display='flex';
    submitScore(elapsed*3);
    saveLeaderboard(elapsed,elapsed*3,false);
  },700);
}

function checkWin(){
  const unrevealed=W*H-revealed.filter(Boolean).length;
  if(unrevealed===M){
    gameOver=true;clearInterval(timerInt);
    tg?.HapticFeedback?.notificationOccurred('success');
    const xp=DIFFS[diff].mines*15+Math.max(0,500-elapsed*5);
    document.getElementById('ov-icon').textContent='🏆';
    document.getElementById('ov-title').textContent='Board Cleared!';
    document.getElementById('ov-time').textContent=elapsed+'s';document.getElementById('ov-time').style.color='#22c55e';
    document.getElementById('ov-sub').textContent=`${diff} · ${M} mines · ${elapsed}s`;
    document.getElementById('ov-xp').textContent=`+${xp} XP Earned`;
    document.getElementById('over-ov').style.display='flex';
    submitScore(xp);
    saveLeaderboard(elapsed,xp,true);
  }
}

function saveLeaderboard(time,xp,won){
  const lb=JSON.parse(localStorage.getItem('nexus_mines_lb')||'[]');
  lb.push({name:player.first_name||'Player',diff,time,xp,won,date:Date.now()});
  lb.sort((a,b)=>b.xp-a.xp);
  localStorage.setItem('nexus_mines_lb',JSON.stringify(lb.slice(0,10)));
}

async function submitScore(xp){
  if(!chatId||!player.id||xp<=0) return;
  try{await fetch(`/api/groups/${chatId}/xp`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`tma ${tg?.initData||''}`},body:JSON.stringify({user_id:player.id,xp})});}catch(e){}
}

newGame();
</script>
</body>
</html>
