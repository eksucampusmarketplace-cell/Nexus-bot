<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Bot Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/zustand@4.4.1/dist/umd/index.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --accent: #00e5ff;
            --secondary: #7000ff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --success: #00ffa3;
            --danger: #ff4d4d;
            --warning: #ffb100;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #root {
            display: flex;
            min-height: 100vh;
        }

        /* Responsive Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            height: 100vh;
            position: sticky;
            top: 0;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
        }

        .main-content {
            flex: 1;
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        @media (min-width: 769px) {
            .main-content {
                max-width: 1000px;
            }
        }

        @media (max-width: 430px) {
            .main-content {
                max-width: 430px;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            margin: 0;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 14px;
            color: var(--text-dim);
            margin: 5px 0 0;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--card-border);
        }

        .toggle-item:last-child {
            border-bottom: none;
        }

        .toggle-info h4 {
            margin: 0;
            font-size: 15px;
        }

        .toggle-info p {
            margin: 4px 0 0;
            font-size: 12px;
            color: var(--text-dim);
        }

        /* Switch Styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .loading-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Tabs */
        .tab-nav {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 10px 0;
            border-top: 1px solid var(--card-border);
            z-index: 100;
        }

        @media (min-width: 769px) {
            .tab-nav {
                display: none;
            }
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: var(--text-dim);
            cursor: pointer;
        }

        .tab-item.active {
            color: var(--accent);
        }

        .tab-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }

        /* Charts */
        .chart-container {
            width: 100%;
            height: 200px;
            margin-top: 20px;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* Toast success */
        .toast.success { background: var(--success); }
        
        /* Stepper */
        .stepper { display: flex; align-items: center; gap: 10px; }
        .stepper button {
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--card-border);
            background: var(--card-bg); color: var(--text); font-size: 18px; cursor: pointer;
        }
        .stepper button:hover { background: var(--accent); border-color: var(--accent); }
        .stepper span { min-width: 40px; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 16px; }
        
        /* Chips */
        .chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 10px; border-radius: 20px;
            background: var(--card-bg); border: 1px solid var(--card-border);
            font-size: 12px; margin: 2px;
        }
        .chip button { background: none; border: none; color: var(--danger); cursor: pointer; padding: 0; font-size: 14px; }
        
        /* Style picker */
        .style-picker { display: flex; gap: 10px; flex-wrap: wrap; }
        .style-picker .style-option {
            padding: 8px 16px; border-radius: 8px; border: 1px solid var(--card-border);
            background: var(--card-bg); cursor: pointer; font-family: 'JetBrains Mono', monospace;
        }
        .style-picker .style-option.selected {
            border-color: var(--accent); box-shadow: 0 0 10px rgba(0,229,255,0.3);
        }
        
        /* Stats cards */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .stat-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 12px; padding: 15px; text-align: center;
        }
        .stat-card .value { font-family: 'Syne', sans-serif; font-size: 28px; color: var(--accent); }
        .stat-card .label { font-size: 12px; color: var(--text-dim); margin-top: 5px; }
        
        /* Action buttons */
        .action-btn {
            padding: 8px 16px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .action-btn.primary { background: var(--accent); color: #000; }
        .action-btn.secondary { background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text); }
        .action-btn.danger { background: var(--danger); color: #fff; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Input */
        .input-field {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--card-border);
            background: rgba(0,0,0,0.2); color: var(--text); font-size: 14px;
        }
        .input-field:focus { outline: none; border-color: var(--accent); }
        
        /* Sub tabs */
        .sub-tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .sub-tab {
            padding: 8px 16px; border-radius: 20px; border: none; background: var(--card-bg);
            color: var(--text-dim); cursor: pointer; font-size: 13px;
        }
        .sub-tab.active { background: var(--accent); color: #000; }
        
        /* Leaderboard */
        .leaderboard-item {
            display: flex; align-items: center; gap: 10px; padding: 10px;
            border-bottom: 1px solid var(--card-border);
        }
        .leaderboard-item .rank { font-family: 'Syne', sans-serif; font-size: 18px; width: 30px; }
        .leaderboard-item .rank.gold { color: #FFD700; }
        .leaderboard-item .rank.silver { color: #C0C0C0; }
        .leaderboard-item .rank.bronze { color: #CD7F32; }
        .leaderboard-item .name { flex: 1; }
        .leaderboard-item .count { color: var(--accent); font-family: 'JetBrains Mono', monospace; }
        
        /* Credit request card */
        .credit-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 12px; padding: 15px; margin-bottom: 10px;
        }
        .credit-card .header { display: flex; justify-content: space-between; align-items: center; }
        .credit-card .matched { color: var(--success); font-size: 12px; }
        .credit-card .unmatched { color: var(--warning); font-size: 12px; }
        .credit-card .actions { display: flex; gap: 10px; margin-top: 10px; }
        
        /* Channel card */
        .channel-card {
            background: linear-gradient(135deg, rgba(112,0,255,0.2), rgba(0,229,255,0.2));
            border: 1px solid var(--card-border); border-radius: 12px; padding: 20px;
            text-align: center;
        }
        .channel-card .channel-name { font-family: 'Syne', sans-serif; font-size: 20px; color: var(--accent); }
        .channel-card .channel-id { color: var(--text-dim); font-size: 12px; margin-top: 5px; }
        .channel-card .actions { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { create } = zustand;

        // --- Store ---
        const useStore = create((set, get) => ({
            activeBotId: null,
            activeGroupId: null,
            activeGroupTitle: "Loading Group...",
            modules: {},
            modulesLoading: {},
            groupSettings: {},
            groupStats: {},
            bots: [],
            groupsByBot: {},
            activeTab: "dashboard",
            groupSelectorOpen: false,

            setActiveTab: (tab) => set({ activeTab: tab }),

            setActiveGroup: (botId, groupId, title) => set({
                activeBotId: botId,
                activeGroupId: groupId,
                activeGroupTitle: title
            }),

            fetchModules: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/modules`);
                    const data = await resp.json();
                    set({ modules: data });
                } catch (err) {
                    console.error("Failed to fetch modules", err);
                }
            },

            toggleModule: async (chatId, moduleName, enabled) => {
                set(state => ({
                    modulesLoading: { ...state.modulesLoading, [moduleName]: true }
                }));

                const oldState = get().modules[moduleName];
                
                // Optimistic update
                set(state => ({
                    modules: { ...state.modules, [moduleName]: enabled }
                }));

                try {
                    const resp = await fetch(`/api/groups/${chatId}/modules/${moduleName}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ enabled })
                    });
                    
                    if (!resp.ok) throw new Error("API call failed");
                } catch (err) {
                    // Revert
                    set(state => ({
                        modules: { ...state.modules, [moduleName]: oldState }
                    }));
                    showToast(`Failed to toggle ${moduleName}`);
                } finally {
                    set(state => ({
                        modulesLoading: { ...state.modulesLoading, [moduleName]: false }
                    }));
                }
            },

            fetchAnalytics: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/analytics`);
                    const data = await resp.json();
                    set({ groupStats: data });
                } catch (err) {}
            },

            fetchHeatmap: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/analytics/heatmap`);
                    const data = await resp.json();
                    set({ heatmapData: data });
                } catch (err) {}
            },

            // Boost config
            boostConfig: {},
            boostStats: {},
            boostLoading: false,

            fetchBoostConfig: async (chatId) => {
                set({ boostLoading: true });
                try {
                    const resp = await fetch(`/api/groups/${chatId}/boost/config`);
                    const data = await resp.json();
                    set({ boostConfig: data });
                } catch (err) {
                    console.error('[BOOST] Fetch config error', err);
                } finally {
                    set({ boostLoading: false });
                }
            },

            saveBoostConfig: async (chatId, config) => {
                set({ boostLoading: true });
                try {
                    const resp = await fetch(`/api/groups/${chatId}/boost/config`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(config)
                    });
                    if (!resp.ok) throw new Error('Save failed');
                    set({ boostConfig: config });
                    showToast('✅ Boost settings saved');
                } catch (err) {
                    console.error('[BOOST] Save error', err);
                    showToast('❌ Failed to save');
                } finally {
                    set({ boostLoading: false });
                }
            },

            fetchBoostStats: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/boost/stats`);
                    const data = await resp.json();
                    set({ boostStats: data });
                } catch (err) {
                    console.error('[BOOST] Fetch stats error', err);
                }
            },

            // Channel gate config
            channelConfig: {},
            channelStats: {},
            channelLoading: false,

            fetchChannelConfig: async (chatId) => {
                set({ channelLoading: true });
                try {
                    const resp = await fetch(`/api/groups/${chatId}/channel-gate/config`);
                    const data = await resp.json();
                    set({ channelConfig: data });
                } catch (err) {
                    console.error('[CHANNEL] Fetch config error', err);
                } finally {
                    set({ channelLoading: false });
                }
            },

            saveChannelConfig: async (chatId, config) => {
                set({ channelLoading: true });
                try {
                    const resp = await fetch(`/api/groups/${chatId}/channel-gate/config`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(config)
                    });
                    if (!resp.ok) throw new Error('Save failed');
                    set({ channelConfig: config });
                    showToast('✅ Channel settings saved');
                } catch (err) {
                    console.error('[CHANNEL] Save error', err);
                    showToast('❌ Failed to save');
                } finally {
                    set({ channelLoading: false });
                }
            },

            fetchChannelStats: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/channel-gate/stats`);
                    const data = await resp.json();
                    set({ channelStats: data });
                } catch (err) {
                    console.error('[CHANNEL] Fetch stats error', err);
                }
            },

            fetchChannelPending: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/channel-gate/pending`);
                    const data = await resp.json();
                    set({ channelPending: data });
                } catch (err) {
                    console.error('[CHANNEL] Fetch pending error', err);
                }
            }
        }));

        function showToast(msg, isSuccess = false) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            if (isSuccess) t.classList.add('success');
            else t.classList.remove('success');
            setTimeout(() => { t.style.display = 'none'; t.classList.remove('success'); }, 3000);
        }

        // --- Components ---

        const LoadingSpinner = () => <div className="loading-spinner"></div>;

        const Toggle = ({ name, description, moduleName }) => {
            const chatId = useStore(state => state.activeGroupId);
            const enabled = useStore(state => state.modules[moduleName] || false);
            const loading = useStore(state => state.modulesLoading[moduleName] || false);
            const toggleModule = useStore(state => state.toggleModule);

            return (
                <div className="toggle-item">
                    <div className="toggle-info">
                        <h4>{name}</h4>
                        <p>{description}</p>
                    </div>
                    <label className="switch">
                        <input 
                            type="checkbox" 
                            checked={enabled} 
                            disabled={loading}
                            onChange={(e) => toggleModule(chatId, moduleName, e.target.checked)}
                        />
                        <span className="slider"></span>
                        {loading && <div style={{position:'absolute', right:'-25px', top:'4px'}}><LoadingSpinner/></div>}
                    </label>
                </div>
            );
        };

        const LineChart = ({ data }) => {
            if (!data || data.length === 0) return <div>No data</div>;
            
            const width = 400;
            const height = 150;
            const padding = 20;

            const maxVal = Math.max(...data.map(d => d.messages), 10);
            const points = data.map((d, i) => {
                const x = (i / (data.length - 1)) * (width - 2 * padding) + padding;
                const y = height - ((d.messages / maxVal) * (height - 2 * padding) + padding);
                return `${x},${y}`;
            }).join(' ');

            const areaPath = `M ${padding},${height-padding} L ${points} L ${width-padding},${height-padding} Z`;

            return (
                <svg viewBox={`0 0 ${width} ${height}`} className="chart">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style={{stopColor:'var(--accent)', stopOpacity:0.3}} />
                            <stop offset="100%" style={{stopColor:'var(--accent)', stopOpacity:0}} />
                        </linearGradient>
                    </defs>
                    <path d={areaPath} fill="url(#grad)" />
                    <polyline
                        fill="none"
                        stroke="var(--accent)"
                        strokeWidth="2"
                        points={points}
                        strokeDasharray="1000"
                        strokeDashoffset="1000"
                    >
                        <animate attributeName="stroke-dashoffset" from="1000" to="0" dur="2s" fill="freeze" />
                    </polyline>
                    {data.map((d, i) => {
                        const x = (i / (data.length - 1)) * (width - 2 * padding) + padding;
                        const y = height - ((d.messages / maxVal) * (height - 2 * padding) + padding);
                        return <circle key={i} cx={x} cy={y} r="3" fill="var(--accent)" />;
                    })}
                </svg>
            );
        };

        const Dashboard = () => {
            const stats = useStore(state => state.groupStats);
            const chatId = useStore(state => state.activeGroupId);
            const fetchAnalytics = useStore(state => state.fetchAnalytics);

            useEffect(() => {
                if (chatId) fetchAnalytics(chatId);
            }, [chatId]);

            return (
                <div>
                    <div className="card">
                        <h3>Message Activity</h3>
                        <div className="chart-container">
                            <LineChart data={stats.activity || []} />
                        </div>
                    </div>
                    <div className="card">
                        <h3>Member Growth</h3>
                        <p>Total: {stats.growth ? stats.growth[stats.growth.length-1]?.total : '...'}</p>
                    </div>
                </div>
            );
        };

        const Modules = () => {
            const categories = {
                "MODERATION": [
                    { id: "warn_system", name: "Warn System", desc: "Track and limit user warnings" },
                    { id: "auto_ban", name: "Auto Ban", desc: "Automatically ban malicious users" },
                    { id: "timed_mute", name: "Timed Mute", desc: "Mute users for a set duration" },
                    { id: "timed_ban", name: "Timed Ban", desc: "Ban users for a set duration" },
                    { id: "silent_mode", name: "Silent Mode", desc: "Send mod logs privately" },
                    { id: "require_reason", name: "Require Reason", desc: "Mandatory reason for mod actions" },
                    { id: "reputation_system", name: "Reputation System", desc: "Community-driven trust" },
                    { id: "trust_score", name: "Trust Score", desc: "Automated behavioral score" },
                    { id: "ai_moderation", name: "AI Moderation", desc: "Intelligent message filtering" }
                ],
                "ANTI-SPAM": [
                    { id: "antiflood", name: "Anti-Flood", desc: "Prevent rapid messaging" },
                    { id: "antispam", name: "Anti-Spam", desc: "Block known spam patterns" },
                    { id: "antilink", name: "Anti-Link", desc: "Control external link sharing" },
                    { id: "anti_forward", name: "Anti-Forward", desc: "Block forwarded messages" },
                    { id: "anti_rtl", name: "Anti-RTL", desc: "Block RTL script messages" },
                    { id: "anti_sticker", name: "Anti-Sticker", desc: "Control sticker usage" },
                    { id: "anti_media", name: "Anti-Media", desc: "Control media uploads" },
                    { id: "anti_bot", name: "Anti-Bot", desc: "Filter automated accounts" }
                ],
                "GREETINGS": [
                    { id: "welcome_message", name: "Welcome Message", desc: "Greet new members" },
                    { id: "goodbye_message", name: "Goodbye Message", desc: "Bid farewell to members" },
                    { id: "welcome_dm", name: "Welcome DM", desc: "Greet new members in private" },
                    { id: "mute_on_join", name: "Mute on Join", desc: "Mute users until verified" },
                    { id: "delete_old_welcome", name: "Delete Old Welcome", desc: "Keep group chat clean" },
                    { id: "auto_delete_welcome", name: "Auto-Delete Welcome", desc: "Remove greetings after timer" }
                ],
                "SECURITY": [
                    { id: "captcha", name: "Captcha", desc: "Verify new users are human" },
                    { id: "anti_raid", name: "Anti-Raid", desc: "Protection during raid events" },
                    { id: "global_ban_sync", name: "Global Ban Sync", desc: "Sync with Nexus global blacklist" },
                    { id: "new_account_filter", name: "New Account Filter", desc: "Restrict fresh accounts" },
                    { id: "suspicious_activity_alert", name: "Suspicious Activity", desc: "Alert on unusual patterns" }
                ],
                "CONTENT": [
                    { id: "word_filter", name: "Word Filter", desc: "Filter prohibited words" },
                    { id: "link_whitelist", name: "Link Whitelist", desc: "Allow specific domains" },
                    { id: "media_whitelist", name: "Media Whitelist", desc: "Allow specific media types" },
                    { id: "spoiler_filter", name: "Spoiler Filter", desc: "Filter unmasked spoilers" },
                    { id: "translation_filter", name: "Translation Filter", desc: "Enforce specific languages" }
                ],
                "CHANNEL": [
                    { id: "auto_post", name: "Auto Post", desc: "Mirror group activity to channel" },
                    { id: "scheduled_posts", name: "Scheduled Posts", desc: "Manage future channel updates" },
                    { id: "post_to_channel", name: "Post to Channel", desc: "Direct bot-to-channel posting" },
                    { id: "channel_comments_mod", name: "Channel Comments", desc: "Moderate linked comments" },
                    { id: "linked_channel_sync", name: "Linked Channel Sync", desc: "Sync group/channel admins" },
                    { id: "post_approval", name: "Post Approval", desc: "Approve group msgs for channel" }
                ],
                "ANALYTICS": [
                    { id: "activity_tracking", name: "Activity Tracking", desc: "Detailed group stats" },
                    { id: "sentiment_analysis", name: "Sentiment Analysis", desc: "Track community mood" },
                    { id: "growth_tracking", name: "Growth Tracking", desc: "Monitor member changes" },
                    { id: "member_heatmap", name: "Member Heatmap", desc: "Peak activity visualization" }
                ],
                "UTILITIES": [
                    { id: "rules_command", name: "Rules Command", desc: "Quick access to group rules" },
                    { id: "afk_system", name: "AFK System", desc: "Manage away-from-keyboard status" },
                    { id: "poll_manager", name: "Poll Manager", desc: "Enhanced poll creation" },
                    { id: "notes_system", name: "Notes System", desc: "Save and retrieve group notes" },
                    { id: "pin_manager", name: "Pin Manager", desc: "Advanced message pinning" }
                ]
            };

            return (
                <div>
                    {Object.entries(categories).map(([cat, mods]) => (
                        <div key={cat} className="card">
                            <h3 style={{fontSize:'14px', color:'var(--accent)', marginBottom:'15px'}}>{cat}</h3>
                            {mods.map(m => (
                                <Toggle key={m.id} name={m.name} description={m.desc} moduleName={m.id} />
                            ))}
                        </div>
                    ))}
                </div>
            );
        };

        const ChannelManager = () => {
            return (
                <div className="card">
                    <h3>📢 Channel Manager</h3>
                    <p>Coming soon...</p>
                </div>
            );
        };

        // --- Boost Configuration Component ---
        const BoostConfig = () => {
            const chatId = useStore(state => state.activeGroupId);
            const config = useStore(state => state.boostConfig);
            const stats = useStore(state => state.boostStats);
            const loading = useStore(state => state.boostLoading);
            const fetchBoostConfig = useStore(state => state.fetchBoostConfig);
            const fetchBoostStats = useStore(state => state.fetchBoostStats);
            const saveBoostConfig = useStore(state => state.saveBoostConfig);

            const [localConfig, setLocalConfig] = useState({});

            useEffect(() => {
                if (chatId) {
                    fetchBoostConfig(chatId);
                    fetchBoostStats(chatId);
                }
            }, [chatId]);

            useEffect(() => {
                setLocalConfig(config);
            }, [config]);

            const handleChange = (key, value) => {
                setLocalConfig(prev => ({ ...prev, [key]: value }));
            };

            const handleSave = () => {
                saveBoostConfig(chatId, localConfig);
            };

            if (!localConfig.force_add_enabled && !localConfig.force_add_required) {
                return (
                    <div>
                        <div className="card" style={{textAlign: 'center', padding: '40px'}}>
                            <h2>⚡ Set Up Member Booster</h2>
                            <p style={{color: 'var(--text-dim)', marginBottom: '20px'}}>
                                Grow your group organically by requiring new members to invite others before they can chat.
                            </p>
                            <button className="action-btn primary" onClick={() => {
                                const newConfig = {...localConfig, force_add_enabled: true, force_add_required: 5};
                                setLocalConfig(newConfig);
                                saveBoostConfig(chatId, newConfig);
                            }}>
                                🚀 Quick Setup — takes 30 seconds
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div>
                    {/* Master Toggle */}
                    <div className="card">
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                            <div>
                                <h3>⚡ Member Booster</h3>
                                <p style={{color: 'var(--text-dim)', fontSize: '13px'}}>Require invites before members can chat</p>
                            </div>
                            <label className="switch">
                                <input 
                                    type="checkbox" 
                                    checked={localConfig.force_add_enabled || false}
                                    onChange={(e) => handleChange('force_add_enabled', e.target.checked)}
                                />
                                <span className="slider"></span>
                            </label>
                        </div>
                    </div>

                    {/* Invite Requirement */}
                    <div className="card">
                        <h4>📋 Invite Requirement</h4>
                        
                        <div style={{marginBottom: '15px'}}>
                            <label style={{display:'block', marginBottom:'8px', fontSize:'13px'}}>Invites required</label>
                            <div className="stepper">
                                <button onClick={() => handleChange('force_add_required', Math.max(1, (localConfig.force_add_required || 5) - 1))}>−</button>
                                <span>{localConfig.force_add_required || 5}</span>
                                <button onClick={() => handleChange('force_add_required', Math.min(100, (localConfig.force_add_required || 5) + 1))}>+</button>
                            </div>
                        </div>

                        <div>
                            <label style={{display:'block', marginBottom:'8px', fontSize:'13px'}}>Action on join</label>
                            {[
                                {value: 'mute', label: '🔇 Mute until complete'},
                                {value: 'restrict_media', label: '🚫 Restrict media only'},
                                {value: 'kick', label: '👢 Kick if zero after 1h'}
                            ].map(opt => (
                                <label key={opt.value} style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'8px', cursor:'pointer'}}>
                                    <input 
                                        type="radio" 
                                        name="action"
                                        checked={localConfig.force_add_action === opt.value}
                                        onChange={() => handleChange('force_add_action', opt.value)}
                                    />
                                    {opt.label}
                                </label>
                            ))}
                        </div>

                        <div style={{marginTop: '15px'}}>
                            <label style={{display:'block', marginBottom:'8px', fontSize:'13px'}}>Progress bar style</label>
                            <div className="style-picker">
                                {['blocks', 'dots', 'emoji', 'numbers'].map(style => (
                                    <div 
                                        key={style}
                                        className={`style-option ${localConfig.force_add_progress_style === style ? 'selected' : ''}`}
                                        onClick={() => handleChange('force_add_progress_style', style)}
                                    >
                                        {style === 'blocks' ? '████░░' : style === 'dots' ? '●●●○○' : style === 'emoji' ? '🟩🟩⬜' : '3/5'}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Exemptions */}
                    <div className="card">
                        <h4>🛡️ Exemptions</h4>
                        <div className="toggle-item">
                            <div className="toggle-info">
                                <h4>Exempt admins</h4>
                                <p>Admins don't need to boost</p>
                            </div>
                            <label className="switch">
                                <input 
                                    type="checkbox" 
                                    checked={localConfig.exempt_admins !== false}
                                    onChange={(e) => handleChange('exempt_admins', e.target.checked)}
                                />
                                <span className="slider"></span>
                            </label>
                        </div>
                    </div>

                    {/* Manual Add Credits */}
                    <div className="card">
                        <h4>📝 Manual Add Credits</h4>
                        <div className="toggle-item">
                            <div className="toggle-info">
                                <h4>Allow credit requests</h4>
                                <p>Members can claim credit for contact adds</p>
                            </div>
                            <label className="switch">
                                <input 
                                    type="checkbox" 
                                    checked={localConfig.manual_add_credit_enabled !== false}
                                    onChange={(e) => handleChange('manual_add_credit_enabled', e.target.checked)}
                                />
                                <span className="slider"></span>
                            </label>
                        </div>
                        <div className="toggle-item">
                            <div className="toggle-info">
                                <h4>Auto-detect manual adds</h4>
                                <p>Notify when someone joins without link</p>
                            </div>
                            <label className="switch">
                                <input 
                                    type="checkbox" 
                                    checked={localConfig.manual_add_auto_detect !== false}
                                    onChange={(e) => handleChange('manual_add_auto_detect', e.target.checked)}
                                />
                                <span className="slider"></span>
                            </label>
                        </div>
                        <div className="toggle-item">
                            <div className="toggle-info">
                                <h4>Witness mode</h4>
                                <p>DM new members asking who invited them</p>
                            </div>
                            <label className="switch">
                                <input 
                                    type="checkbox" 
                                    checked={localConfig.manual_add_witness_mode || false}
                                    onChange={(e) => handleChange('manual_add_witness_mode', e.target.checked)}
                                />
                                <span className="slider"></span>
                            </label>
                        </div>
                    </div>

                    {/* Messages */}
                    <div className="card">
                        <h4>💬 Messages</h4>
                        <div style={{marginBottom: '15px'}}>
                            <label style={{display:'block', marginBottom:'8px', fontSize:'13px'}}>Boost message</label>
                            <textarea 
                                className="input-field"
                                rows={4}
                                value={localConfig.force_add_message || ''}
                                onChange={(e) => handleChange('force_add_message', e.target.value)}
                            />
                            <div style={{marginTop:'8px'}}>
                                {['{first_name}', '{required}', '{current}', '{remaining}', '{link}', '{bar}'].map(v => (
                                    <span 
                                        key={v} 
                                        onClick={() => handleChange('force_add_message', (localConfig.force_add_message || '') + v)}
                                        style={{fontSize:'10px', background:'var(--card-border)', padding:'2px 5px', borderRadius:'3px', cursor:'pointer', marginRight:'5px'}}
                                    >
                                        {v}
                                    </span>
                                ))}
                            </div>
                        </div>
                        <div>
                            <label style={{display:'block', marginBottom:'8px', fontSize:'13px'}}>Unlock message</label>
                            <textarea 
                                className="input-field"
                                rows={2}
                                value={localConfig.force_add_unlock_message || ''}
                                onChange={(e) => handleChange('force_add_unlock_message', e.target.value)}
                            />
                        </div>
                    </div>

                    {/* Stats */}
                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="value">{stats.locked_count || 0}</div>
                            <div className="label">🔒 Locked</div>
                        </div>
                        <div className="stat-card">
                            <div className="value">{stats.unlocked_count || 0}</div>
                            <div className="label">✅ Unlocked</div>
                        </div>
                        <div className="stat-card">
                            <div className="value">{stats.exempted_count || 0}</div>
                            <div className="label">⭐ Exempted</div>
                        </div>
                    </div>

                    {/* Leaderboard */}
                    {stats.top_inviters && stats.top_inviters.length > 0 && (
                        <div className="card">
                            <h4>🏆 Top Inviters</h4>
                            {stats.top_inviters.slice(0, 5).map((inviter, i) => (
                                <div key={inviter.user_id} className="leaderboard-item">
                                    <span className={`rank ${i===0?'gold':i===1?'silver':i===2?'bronze':''}`}>
                                        {i+1}
                                    </span>
                                    <span className="name">@{inviter.username || inviter.first_name || 'Unknown'}</span>
                                    <span className="count">{inviter.total_invites || 0}</span>
                                </div>
                            ))}
                        </div>
                    )}

                    <button 
                        className="action-btn primary" 
                        style={{width:'100%', marginTop:'20px'}}
                        onClick={handleSave}
                        disabled={loading}
                    >
                        {loading ? <LoadingSpinner/> : '💾 Save Boost Settings'}
                    </button>
                </div>
            );
        };

        // --- Channel Gate Configuration Component ---
        const ChannelGate = () => {
            const chatId = useStore(state => state.activeGroupId);
            const config = useStore(state => state.channelConfig);
            const stats = useStore(state => state.channelStats);
            const loading = useStore(state => state.channelLoading);
            const fetchChannelConfig = useStore(state => state.fetchChannelConfig);
            const fetchChannelStats = useStore(state => state.fetchChannelStats);
            const saveChannelConfig = useStore(state => state.saveChannelConfig);

            const [localConfig, setLocalConfig] = useState({});
            const [channelInput, setChannelInput] = useState('');

            useEffect(() => {
                if (chatId) {
                    fetchChannelConfig(chatId);
                    fetchChannelStats(chatId);
                }
            }, [chatId]);

            useEffect(() => {
                setLocalConfig(config);
                setChannelInput(config.force_channel_username || '');
            }, [config]);

            const handleChange = (key, value) => {
                setLocalConfig(prev => ({ ...prev, [key]: value }));
            };

            const handleSave = () => {
                saveChannelConfig(chatId, localConfig);
            };

            const handleLinkChannel = async () => {
                if (!channelInput) return;
                const newConfig = {
                    ...localConfig,
                    force_channel_enabled: true,
                    force_channel_username: channelInput.startsWith('@') ? channelInput.slice(1) : channelInput
                };
                setLocalConfig(newConfig);
                saveChannelConfig(chatId, newConfig);
            };

            const handleUnlink = () => {
                const newConfig = {
                    ...localConfig,
                    force_channel_enabled: false,
                    force_channel_id: null,
                    force_channel_username: null
                };
                setLocalConfig(newConfig);
                saveChannelConfig(chatId, newConfig);
            };

            if (!localConfig.force_channel_enabled && !localConfig.force_channel_id) {
                return (
                    <div>
                        <div className="card">
                            <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                                <div>
                                    <h3>📢 Force Join Channel</h3>
                                    <p style={{color: 'var(--text-dim)', fontSize:'13px'}}>Require channel membership to chat</p>
                                </div>
                                <label className="switch">
                                    <input 
                                        type="checkbox" 
                                        checked={localConfig.force_channel_enabled || false}
                                        onChange={(e) => handleChange('force_channel_enabled', e.target.checked)}
                                    />
                                    <span className="slider"></span>
                                </label>
                            </div>
                        </div>

                        <div className="card" style={{textAlign:'center', padding:'40px'}}>
                            <h3>Link a Channel</h3>
                            <input 
                                className="input-field" 
                                placeholder="@channel or -100123456789"
                                value={channelInput}
                                onChange={(e) => setChannelInput(e.target.value)}
                                style={{marginBottom:'15px'}}
                            />
                            <button className="action-btn primary" onClick={handleLinkChannel}>
                                🔗 Link Channel
                            </button>
                            <p style={{fontSize:'12px', color:'var(--text-dim)', marginTop:'15px'}}>
                                Bot must be admin of the channel to verify memberships
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div>
                    {/* Master Toggle */}
                    <div className="card">
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                            <div>
                                <h3>📢 Force Join Channel</h3>
                                <p style={{color: 'var(--text-dim)', fontSize: '13px'}}>Require channel membership to chat</p>
                            </div>
                            <label className="switch">
                                <input 
                                    type="checkbox" 
                                    checked={localConfig.force_channel_enabled || false}
                                    onChange={(e) => handleChange('force_channel_enabled', e.target.checked)}
                                />
                                <span className="slider"></span>
                            </label>
                        </div>
                    </div>

                    {/* Channel Card */}
                    <div className="channel-card">
                        <div className="channel-name">@{localConfig.force_channel_username || 'Not set'}</div>
                        <div className="channel-id">ID: {localConfig.force_channel_id || '—'}</div>
                        <div className="actions">
                            <button className="action-btn secondary" onClick={handleUnlink}>✕ Remove</button>
                        </div>
                    </div>

                    {/* Enforcement */}
                    <div className="card">
                        <h4>⚖️ Enforcement</h4>
                        {[
                            {value: 'restrict', label: '🔇 Restrict (can\'t send)'},
                            {value: 'delete_only', label: '🗑️ Delete messages only'},
                            {value: 'kick', label: '👢 Kick if not joined'},
                            {value: 'silent', label: '🤫 Silent restrict'}
                        ].map(opt => (
                            <label key={opt.value} style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'8px', cursor:'pointer'}}>
                                <input 
                                    type="radio" 
                                    name="channel_action"
                                    checked={localConfig.force_channel_action === opt.value}
                                    onChange={() => handleChange('force_channel_action', opt.value)}
                                />
                                {opt.label}
                            </label>
                        ))}
                    </div>

                    {/* Message */}
                    <div className="card">
                        <h4>💬 Gate Message</h4>
                        <textarea 
                            className="input-field"
                            rows={3}
                            value={localConfig.force_channel_message || ''}
                            onChange={(e) => handleChange('force_channel_message', e.target.value)}
                        />
                    </div>

                    {/* Exemptions */}
                    <div className="card">
                        <div className="toggle-item">
                            <div className="toggle-info">
                                <h4>Exempt admins</h4>
                                <p>Admins don't need to join channel</p>
                            </div>
                            <label className="switch">
                                <input 
                                    type="checkbox" 
                                    checked={localConfig.exempt_admins !== false}
                                    onChange={(e) => handleChange('exempt_admins', e.target.checked)}
                                />
                                <span className="slider"></span>
                            </label>
                        </div>
                    </div>

                    {/* Stats */}
                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="value">{stats.pending_count || 0}</div>
                            <div className="label">⏳ Pending</div>
                        </div>
                        <div className="stat-card">
                            <div className="value">{stats.verified_count || 0}</div>
                            <div className="label">✅ Verified</div>
                        </div>
                        <div className="stat-card">
                            <div className="value">{stats.avg_verify_seconds || 0}s</div>
                            <div className="label">📊 Avg Time</div>
                        </div>
                    </div>

                    <button 
                        className="action-btn primary" 
                        style={{width:'100%', marginTop:'20px'}}
                        onClick={handleSave}
                        disabled={loading}
                    >
                        {loading ? <LoadingSpinner/> : '💾 Save Channel Settings'}
                    </button>
                </div>
            );
        };

        const Manage = () => {
            const [activeSubTab, setActiveSubTab] = useState("greetings");
            const [text, setText] = useState("");
            const chatId = useStore(state => state.activeGroupId);

            const saveConfig = async () => {
                await fetch(`/api/groups/${chatId}/text-config`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ [activeSubTab]: text })
                });
                showToast("Saved!", true);
            };

            return (
                <div>
                    <div className="sub-tabs">
                        <button className={`sub-tab ${activeSubTab==='welcome'?'active':''}`} onClick={() => setActiveSubTab("welcome")}>Welcome</button>
                        <button className={`sub-tab ${activeSubTab==='goodbye'?'active':''}`} onClick={() => setActiveSubTab("goodbye")}>Goodbye</button>
                        <button className={`sub-tab ${activeSubTab==='rules'?'active':''}`} onClick={() => setActiveSubTab("rules")}>Rules</button>
                        <button className={`sub-tab ${activeSubTab==='boost'?'active':''}`} onClick={() => setActiveSubTab("boost")}>⚡ Boost</button>
                        <button className={`sub-tab ${activeSubTab==='channel'?'active':''}`} onClick={() => setActiveSubTab("channel")}>📢 Channel</button>
                    </div>
                    
                    {activeSubTab === 'boost' && <BoostConfig />}
                    {activeSubTab === 'channel' && <ChannelGate />}
                    
                    {activeSubTab !== 'boost' && activeSubTab !== 'channel' && (
                        <div className="card">
                            <h4>Edit {activeSubTab}</h4>
                            <textarea 
                                style={{width:'100%', height:'150px', background:'rgba(0,0,0,0.2)', border:'1px solid var(--card-border)', borderRadius:'8px', color:'#fff', padding:'10px'}}
                                value={text}
                                onChange={(e) => setText(e.target.value)}
                            />
                            <div style={{marginTop:'10px', display:'flex', flexWrap:'wrap', gap:'5px'}}>
                                {['{first}', '{fullname}', '{username}', '{mention}', '{chatname}'].map(v => (
                                    <span key={v} onClick={() => setText(text + v)} style={{fontSize:'10px', background:'var(--card-border)', padding:'2px 5px', borderRadius:'3px', cursor:'pointer'}}>{v}</span>
                                ))}
                            </div>
                            <button onClick={saveConfig} style={{marginTop:'20px', width:'100%', padding:'12px', background:'var(--accent)', border:'none', borderRadius:'8px', fontWeight:'bold'}}>Save Changes</button>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const { activeTab, setActiveTab, activeGroupTitle, activeGroupId, fetchModules, fetchAnalytics } = useStore();

            useEffect(() => {
                const tg = window.Telegram.WebApp;
                tg.expand();
                
                // For demo, set a default chat_id
                const params = new URLSearchParams(window.location.search);
                const chatId = params.get('chat_id') || -100123456789;
                useStore.getState().setActiveGroup(0, chatId, "Nexus Support Group");
                
                fetchModules(chatId);
            }, []);

            const renderContent = () => {
                switch(activeTab) {
                    case 'dashboard': return <Dashboard />;
                    case 'modules': return <Modules />;
                    case 'manage': return <Manage />;
                    case 'channel': return <ChannelManager />;
                    default: return <Dashboard />;
                }
            };

            return (
                <React.Fragment>
                    <div id="toast" className="toast"></div>
                    
                    <div className="sidebar">
                        <div className="header">
                            <h1>⚡ Nexus</h1>
                            <p>Intelligent Group Management</p>
                        </div>
                        <nav style={{display:'flex', flexDirection:'column', gap:'10px', marginTop:'40px'}}>
                            <div onClick={() => setActiveTab('dashboard')} style={{padding:'10px', color: activeTab==='dashboard'?'var(--accent)':'#fff', cursor:'pointer'}}>Dashboard</div>
                            <div onClick={() => setActiveTab('modules')} style={{padding:'10px', color: activeTab==='modules'?'var(--accent)':'#fff', cursor:'pointer'}}>Modules</div>
                            <div onClick={() => setActiveTab('manage')} style={{padding:'10px', color: activeTab==='manage'?'var(--accent)':'#fff', cursor:'pointer'}}>Manage</div>
                            <div onClick={() => setActiveTab('channel')} style={{padding:'10px', color: activeTab==='channel'?'var(--accent)':'#fff', cursor:'pointer'}}>Channel</div>
                        </nav>
                    </div>

                    <div className="main-content">
                        <div className="header" style={{display: window.innerWidth > 768 ? 'none' : 'block'}}>
                            <h1>⚡ Nexus</h1>
                            <p>Intelligent Group Management</p>
                        </div>

                        <div className="card" style={{padding:'12px 20px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                            <span style={{fontSize:'14px', fontWeight:'600'}}>{activeGroupTitle}</span>
                            <span style={{fontSize:'12px', color:'var(--accent)'}}>ID: {activeGroupId}</span>
                        </div>

                        {renderContent()}
                    </div>

                    <div className="tab-nav">
                        <div className={`tab-item ${activeTab==='dashboard'?'active':''}`} onClick={() => setActiveTab('dashboard')}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                            <span>Dashboard</span>
                        </div>
                        <div className={`tab-item ${activeTab==='modules'?'active':''}`} onClick={() => setActiveTab('modules')}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                            <span>Modules</span>
                        </div>
                        <div className={`tab-item ${activeTab==='manage'?'active':''}`} onClick={() => setActiveTab('manage')}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                            <span>Manage</span>
                        </div>
                        <div className={`tab-item ${activeTab==='channel'?'active':''}`} onClick={() => setActiveTab('channel')}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                            <span>Channel</span>
                        </div>
                    </div>
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
