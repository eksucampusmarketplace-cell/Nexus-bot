<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Bot Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/zustand@4.4.1/dist/umd/index.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --accent: #00e5ff;
            --secondary: #7000ff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --success: #00ffa3;
            --danger: #ff4d4d;
            --warning: #ffb100;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #root {
            display: flex;
            min-height: 100vh;
        }

        /* Responsive Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            height: 100vh;
            position: sticky;
            top: 0;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
        }

        .main-content {
            flex: 1;
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        @media (min-width: 769px) {
            .main-content {
                max-width: 1000px;
            }
        }

        @media (max-width: 430px) {
            .main-content {
                max-width: 430px;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            margin: 0;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 14px;
            color: var(--text-dim);
            margin: 5px 0 0;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--card-border);
        }

        .toggle-item:last-child {
            border-bottom: none;
        }

        .toggle-info h4 {
            margin: 0;
            font-size: 15px;
        }

        .toggle-info p {
            margin: 4px 0 0;
            font-size: 12px;
            color: var(--text-dim);
        }

        /* Switch Styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .loading-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Tabs */
        .tab-nav {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 10px 0;
            border-top: 1px solid var(--card-border);
            z-index: 100;
        }

        @media (min-width: 769px) {
            .tab-nav {
                display: none;
            }
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: var(--text-dim);
            cursor: pointer;
        }

        .tab-item.active {
            color: var(--accent);
        }

        .tab-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }

        /* Charts */
        .chart-container {
            width: 100%;
            height: 200px;
            margin-top: 20px;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--danger);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 1000;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { create } = zustand;

        // --- Store ---
        const useStore = create((set, get) => ({
            activeBotId: null,
            activeGroupId: null,
            activeGroupTitle: "Loading Group...",
            modules: {},
            modulesLoading: {},
            groupSettings: {},
            groupStats: {},
            bots: [],
            groupsByBot: {},
            activeTab: "dashboard",
            groupSelectorOpen: false,

            setActiveTab: (tab) => set({ activeTab: tab }),

            setActiveGroup: (botId, groupId, title) => set({
                activeBotId: botId,
                activeGroupId: groupId,
                activeGroupTitle: title
            }),

            fetchModules: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/modules`);
                    const data = await resp.json();
                    set({ modules: data });
                } catch (err) {
                    console.error("Failed to fetch modules", err);
                }
            },

            toggleModule: async (chatId, moduleName, enabled) => {
                set(state => ({
                    modulesLoading: { ...state.modulesLoading, [moduleName]: true }
                }));

                const oldState = get().modules[moduleName];
                
                // Optimistic update
                set(state => ({
                    modules: { ...state.modules, [moduleName]: enabled }
                }));

                try {
                    const resp = await fetch(`/api/groups/${chatId}/modules/${moduleName}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ enabled })
                    });
                    
                    if (!resp.ok) throw new Error("API call failed");
                } catch (err) {
                    // Revert
                    set(state => ({
                        modules: { ...state.modules, [moduleName]: oldState }
                    }));
                    showToast(`Failed to toggle ${moduleName}`);
                } finally {
                    set(state => ({
                        modulesLoading: { ...state.modulesLoading, [moduleName]: false }
                    }));
                }
            },

            fetchAnalytics: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/analytics`);
                    const data = await resp.json();
                    set({ groupStats: data });
                } catch (err) {}
            },

            fetchHeatmap: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/analytics/heatmap`);
                    const data = await resp.json();
                    set({ heatmapData: data });
                } catch (err) {}
            }
        }));

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // --- Components ---

        const LoadingSpinner = () => <div className="loading-spinner"></div>;

        const Toggle = ({ name, description, moduleName }) => {
            const chatId = useStore(state => state.activeGroupId);
            const enabled = useStore(state => state.modules[moduleName] || false);
            const loading = useStore(state => state.modulesLoading[moduleName] || false);
            const toggleModule = useStore(state => state.toggleModule);

            return (
                <div className="toggle-item">
                    <div className="toggle-info">
                        <h4>{name}</h4>
                        <p>{description}</p>
                    </div>
                    <label className="switch">
                        <input 
                            type="checkbox" 
                            checked={enabled} 
                            disabled={loading}
                            onChange={(e) => toggleModule(chatId, moduleName, e.target.checked)}
                        />
                        <span className="slider"></span>
                        {loading && <div style={{position:'absolute', right:'-25px', top:'4px'}}><LoadingSpinner/></div>}
                    </label>
                </div>
            );
        };

        const LineChart = ({ data }) => {
            if (!data || data.length === 0) return <div>No data</div>;
            
            const width = 400;
            const height = 150;
            const padding = 20;

            const maxVal = Math.max(...data.map(d => d.messages), 10);
            const points = data.map((d, i) => {
                const x = (i / (data.length - 1)) * (width - 2 * padding) + padding;
                const y = height - ((d.messages / maxVal) * (height - 2 * padding) + padding);
                return `${x},${y}`;
            }).join(' ');

            const areaPath = `M ${padding},${height-padding} L ${points} L ${width-padding},${height-padding} Z`;

            return (
                <svg viewBox={`0 0 ${width} ${height}`} className="chart">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style={{stopColor:'var(--accent)', stopOpacity:0.3}} />
                            <stop offset="100%" style={{stopColor:'var(--accent)', stopOpacity:0}} />
                        </linearGradient>
                    </defs>
                    <path d={areaPath} fill="url(#grad)" />
                    <polyline
                        fill="none"
                        stroke="var(--accent)"
                        strokeWidth="2"
                        points={points}
                        strokeDasharray="1000"
                        strokeDashoffset="1000"
                    >
                        <animate attributeName="stroke-dashoffset" from="1000" to="0" dur="2s" fill="freeze" />
                    </polyline>
                    {data.map((d, i) => {
                        const x = (i / (data.length - 1)) * (width - 2 * padding) + padding;
                        const y = height - ((d.messages / maxVal) * (height - 2 * padding) + padding);
                        return <circle key={i} cx={x} cy={y} r="3" fill="var(--accent)" />;
                    })}
                </svg>
            );
        };

        const Dashboard = () => {
            const stats = useStore(state => state.groupStats);
            const chatId = useStore(state => state.activeGroupId);
            const fetchAnalytics = useStore(state => state.fetchAnalytics);

            useEffect(() => {
                if (chatId) fetchAnalytics(chatId);
            }, [chatId]);

            return (
                <div>
                    <div className="card">
                        <h3>Message Activity</h3>
                        <div className="chart-container">
                            <LineChart data={stats.activity || []} />
                        </div>
                    </div>
                    <div className="card">
                        <h3>Member Growth</h3>
                        <p>Total: {stats.growth ? stats.growth[stats.growth.length-1]?.total : '...'}</p>
                    </div>
                </div>
            );
        };

        const Modules = () => {
            const categories = {
                "MODERATION": [
                    { id: "warn_system", name: "Warn System", desc: "Track and limit user warnings" },
                    { id: "auto_ban", name: "Auto Ban", desc: "Automatically ban malicious users" },
                    { id: "timed_mute", name: "Timed Mute", desc: "Mute users for a set duration" },
                    { id: "timed_ban", name: "Timed Ban", desc: "Ban users for a set duration" },
                    { id: "silent_mode", name: "Silent Mode", desc: "Send mod logs privately" },
                    { id: "require_reason", name: "Require Reason", desc: "Mandatory reason for mod actions" },
                    { id: "reputation_system", name: "Reputation System", desc: "Community-driven trust" },
                    { id: "trust_score", name: "Trust Score", desc: "Automated behavioral score" },
                    { id: "ai_moderation", name: "AI Moderation", desc: "Intelligent message filtering" }
                ],
                "ANTI-SPAM": [
                    { id: "antiflood", name: "Anti-Flood", desc: "Prevent rapid messaging" },
                    { id: "antispam", name: "Anti-Spam", desc: "Block known spam patterns" },
                    { id: "antilink", name: "Anti-Link", desc: "Control external link sharing" },
                    { id: "anti_forward", name: "Anti-Forward", desc: "Block forwarded messages" },
                    { id: "anti_rtl", name: "Anti-RTL", desc: "Block RTL script messages" },
                    { id: "anti_sticker", name: "Anti-Sticker", desc: "Control sticker usage" },
                    { id: "anti_media", name: "Anti-Media", desc: "Control media uploads" },
                    { id: "anti_bot", name: "Anti-Bot", desc: "Filter automated accounts" }
                ],
                "GREETINGS": [
                    { id: "welcome_message", name: "Welcome Message", desc: "Greet new members" },
                    { id: "goodbye_message", name: "Goodbye Message", desc: "Bid farewell to members" },
                    { id: "welcome_dm", name: "Welcome DM", desc: "Greet new members in private" },
                    { id: "mute_on_join", name: "Mute on Join", desc: "Mute users until verified" },
                    { id: "delete_old_welcome", name: "Delete Old Welcome", desc: "Keep group chat clean" },
                    { id: "auto_delete_welcome", name: "Auto-Delete Welcome", desc: "Remove greetings after timer" }
                ],
                "SECURITY": [
                    { id: "captcha", name: "Captcha", desc: "Verify new users are human" },
                    { id: "anti_raid", name: "Anti-Raid", desc: "Protection during raid events" },
                    { id: "global_ban_sync", name: "Global Ban Sync", desc: "Sync with Nexus global blacklist" },
                    { id: "new_account_filter", name: "New Account Filter", desc: "Restrict fresh accounts" },
                    { id: "suspicious_activity_alert", name: "Suspicious Activity", desc: "Alert on unusual patterns" }
                ],
                "CONTENT": [
                    { id: "word_filter", name: "Word Filter", desc: "Filter prohibited words" },
                    { id: "link_whitelist", name: "Link Whitelist", desc: "Allow specific domains" },
                    { id: "media_whitelist", name: "Media Whitelist", desc: "Allow specific media types" },
                    { id: "spoiler_filter", name: "Spoiler Filter", desc: "Filter unmasked spoilers" },
                    { id: "translation_filter", name: "Translation Filter", desc: "Enforce specific languages" }
                ],
                "CHANNEL": [
                    { id: "auto_post", name: "Auto Post", desc: "Mirror group activity to channel" },
                    { id: "scheduled_posts", name: "Scheduled Posts", desc: "Manage future channel updates" },
                    { id: "post_to_channel", name: "Post to Channel", desc: "Direct bot-to-channel posting" },
                    { id: "channel_comments_mod", name: "Channel Comments", desc: "Moderate linked comments" },
                    { id: "linked_channel_sync", name: "Linked Channel Sync", desc: "Sync group/channel admins" },
                    { id: "post_approval", name: "Post Approval", desc: "Approve group msgs for channel" }
                ],
                "ANALYTICS": [
                    { id: "activity_tracking", name: "Activity Tracking", desc: "Detailed group stats" },
                    { id: "sentiment_analysis", name: "Sentiment Analysis", desc: "Track community mood" },
                    { id: "growth_tracking", name: "Growth Tracking", desc: "Monitor member changes" },
                    { id: "member_heatmap", name: "Member Heatmap", desc: "Peak activity visualization" }
                ],
                "UTILITIES": [
                    { id: "rules_command", name: "Rules Command", desc: "Quick access to group rules" },
                    { id: "afk_system", name: "AFK System", desc: "Manage away-from-keyboard status" },
                    { id: "poll_manager", name: "Poll Manager", desc: "Enhanced poll creation" },
                    { id: "notes_system", name: "Notes System", desc: "Save and retrieve group notes" },
                    { id: "pin_manager", name: "Pin Manager", desc: "Advanced message pinning" }
                ]
            };

            return (
                <div>
                    {Object.entries(categories).map(([cat, mods]) => (
                        <div key={cat} className="card">
                            <h3 style={{fontSize:'14px', color:'var(--accent)', marginBottom:'15px'}}>{cat}</h3>
                            {mods.map(m => (
                                <Toggle key={m.id} name={m.name} description={m.desc} moduleName={m.id} />
                            ))}
                        </div>
                    ))}
                </div>
            );
        };

        const ChannelManager = () => {
            return (
                <div className="card">
                    <h3>📢 Channel Manager</h3>
                    <p>Coming soon...</p>
                </div>
            );
        };

        const Manage = () => {
            const [activeSubTab, setActiveSubTab] = useState("greetings");
            const [text, setText] = useState("");
            const chatId = useStore(state => state.activeGroupId);

            const saveConfig = async () => {
                await fetch(`/api/groups/${chatId}/text-config`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ [activeSubTab]: text })
                });
                showToast("Saved!");
            };

            return (
                <div>
                    <div className="card" style={{display:'flex', gap:'10px', marginBottom:'10px', padding:'10px'}}>
                        <button onClick={() => setActiveSubTab("welcome")} style={{background: activeSubTab==='welcome'?'var(--accent)':'none', border:'none', color:'#fff', padding:'5px 10px', borderRadius:'5px'}}>Welcome</button>
                        <button onClick={() => setActiveSubTab("goodbye")} style={{background: activeSubTab==='goodbye'?'var(--accent)':'none', border:'none', color:'#fff', padding:'5px 10px', borderRadius:'5px'}}>Goodbye</button>
                        <button onClick={() => setActiveSubTab("rules")} style={{background: activeSubTab==='rules'?'var(--accent)':'none', border:'none', color:'#fff', padding:'5px 10px', borderRadius:'5px'}}>Rules</button>
                    </div>
                    <div className="card">
                        <h4>Edit {activeSubTab}</h4>
                        <textarea 
                            style={{width:'100%', height:'150px', background:'rgba(0,0,0,0.2)', border:'1px solid var(--card-border)', borderRadius:'8px', color:'#fff', padding:'10px'}}
                            value={text}
                            onChange={(e) => setText(e.target.value)}
                        />
                        <div style={{marginTop:'10px', display:'flex', flexWrap:'wrap', gap:'5px'}}>
                            {['{first}', '{fullname}', '{username}', '{mention}', '{chatname}'].map(v => (
                                <span key={v} onClick={() => setText(text + v)} style={{fontSize:'10px', background:'var(--card-border)', padding:'2px 5px', borderRadius:'3px', cursor:'pointer'}}>{v}</span>
                            ))}
                        </div>
                        <button onClick={saveConfig} style={{marginTop:'20px', width:'100%', padding:'12px', background:'var(--accent)', border:'none', borderRadius:'8px', fontWeight:'bold'}}>Save Changes</button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const { activeTab, setActiveTab, activeGroupTitle, activeGroupId, fetchModules, fetchAnalytics } = useStore();

            useEffect(() => {
                const tg = window.Telegram.WebApp;
                tg.expand();
                
                // For demo, set a default chat_id
                const params = new URLSearchParams(window.location.search);
                const chatId = params.get('chat_id') || -100123456789;
                useStore.getState().setActiveGroup(0, chatId, "Nexus Support Group");
                
                fetchModules(chatId);
            }, []);

            const renderContent = () => {
                switch(activeTab) {
                    case 'dashboard': return <Dashboard />;
                    case 'modules': return <Modules />;
                    case 'manage': return <Manage />;
                    case 'channel': return <ChannelManager />;
                    default: return <Dashboard />;
                }
            };

            return (
                <React.Fragment>
                    <div id="toast" className="toast"></div>
                    
                    <div className="sidebar">
                        <div className="header">
                            <h1>⚡ Nexus</h1>
                            <p>Intelligent Group Management</p>
                        </div>
                        <nav style={{display:'flex', flexDirection:'column', gap:'10px', marginTop:'40px'}}>
                            <div onClick={() => setActiveTab('dashboard')} style={{padding:'10px', color: activeTab==='dashboard'?'var(--accent)':'#fff', cursor:'pointer'}}>Dashboard</div>
                            <div onClick={() => setActiveTab('modules')} style={{padding:'10px', color: activeTab==='modules'?'var(--accent)':'#fff', cursor:'pointer'}}>Modules</div>
                            <div onClick={() => setActiveTab('manage')} style={{padding:'10px', color: activeTab==='manage'?'var(--accent)':'#fff', cursor:'pointer'}}>Manage</div>
                            <div onClick={() => setActiveTab('channel')} style={{padding:'10px', color: activeTab==='channel'?'var(--accent)':'#fff', cursor:'pointer'}}>Channel</div>
                        </nav>
                    </div>

                    <div className="main-content">
                        <div className="header" style={{display: window.innerWidth > 768 ? 'none' : 'block'}}>
                            <h1>⚡ Nexus</h1>
                            <p>Intelligent Group Management</p>
                        </div>

                        <div className="card" style={{padding:'12px 20px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                            <span style={{fontSize:'14px', fontWeight:'600'}}>{activeGroupTitle}</span>
                            <span style={{fontSize:'12px', color:'var(--accent)'}}>ID: {activeGroupId}</span>
                        </div>

                        {renderContent()}
                    </div>

                    <div className="tab-nav">
                        <div className={`tab-item ${activeTab==='dashboard'?'active':''}`} onClick={() => setActiveTab('dashboard')}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                            <span>Dashboard</span>
                        </div>
                        <div className={`tab-item ${activeTab==='modules'?'active':''}`} onClick={() => setActiveTab('modules')}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                            <span>Modules</span>
                        </div>
                        <div className={`tab-item ${activeTab==='manage'?'active':''}`} onClick={() => setActiveTab('manage')}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                            <span>Manage</span>
                        </div>
                        <div className={`tab-item ${activeTab==='channel'?'active':''}`} onClick={() => setActiveTab('channel')}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                            <span>Channel</span>
                        </div>
                    </div>
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
