<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Bot Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/zustand@4.4.1/dist/umd/index.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --accent: #00e5ff;
            --secondary: #7000ff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --success: #00ffa3;
            --danger: #ff4d4d;
            --warning: #ffb100;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #root {
            display: flex;
            min-height: 100vh;
        }

        /* Responsive Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid var(--card-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            height: 100vh;
            position: sticky;
            top: 0;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
        }

        .main-content {
            flex: 1;
            max-width: 100%;
            margin: 0 auto;
            padding: 20px;
        }

        @media (min-width: 769px) {
            .main-content {
                max-width: 1000px;
            }
        }

        @media (max-width: 430px) {
            .main-content {
                max-width: 430px;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            margin: 0;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            font-size: 14px;
            color: var(--text-dim);
            margin: 5px 0 0;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--card-border);
        }

        .toggle-item:last-child {
            border-bottom: none;
        }

        .toggle-info h4 {
            margin: 0;
            font-size: 15px;
        }

        .toggle-info p {
            margin: 4px 0 0;
            font-size: 12px;
            color: var(--text-dim);
        }

        /* Switch Styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .loading-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Tabs */
        .tab-nav {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 10px 0;
            border-top: 1px solid var(--card-border);
            z-index: 100;
        }

        @media (min-width: 769px) {
            .tab-nav {
                display: none;
            }
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: var(--text-dim);
            cursor: pointer;
        }

        .tab-item.active {
            color: var(--accent);
        }

        .tab-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }

        /* Charts */
        .chart-container {
            width: 100%;
            height: 200px;
            margin-top: 20px;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        /* Toast success */
        .toast.success { background: var(--success); }
        
        /* Stepper */
        .stepper { display: flex; align-items: center; gap: 10px; }
        .stepper button {
            width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--card-border);
            background: var(--card-bg); color: var(--text); font-size: 18px; cursor: pointer;
        }
        .stepper button:hover { background: var(--accent); border-color: var(--accent); }
        .stepper span { min-width: 40px; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 16px; }
        
        /* Chips */
        .chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 10px; border-radius: 20px;
            background: var(--card-bg); border: 1px solid var(--card-border);
            font-size: 12px; margin: 2px;
        }
        .chip button { background: none; border: none; color: var(--danger); cursor: pointer; padding: 0; font-size: 14px; }
        
        /* Style picker */
        .style-picker { display: flex; gap: 10px; flex-wrap: wrap; }
        .style-picker .style-option {
            padding: 8px 16px; border-radius: 8px; border: 1px solid var(--card-border);
            background: var(--card-bg); cursor: pointer; font-family: 'JetBrains Mono', monospace;
        }
        .style-picker .style-option.selected {
            border-color: var(--accent); box-shadow: 0 0 10px rgba(0,229,255,0.3);
        }
        
        /* Stats cards */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .stat-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 12px; padding: 15px; text-align: center;
        }
        .stat-card .value { font-family: 'Syne', sans-serif; font-size: 28px; color: var(--accent); }
        .stat-card .label { font-size: 12px; color: var(--text-dim); margin-top: 5px; }
        
        /* Action buttons */
        .action-btn {
            padding: 8px 16px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .action-btn.primary { background: var(--accent); color: #000; }
        .action-btn.secondary { background: var(--card-bg); border: 1px solid var(--card-border); color: var(--text); }
        .action-btn.danger { background: var(--danger); color: #fff; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Input */
        .input-field {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--card-border);
            background: rgba(0,0,0,0.2); color: var(--text); font-size: 14px;
        }
        .input-field:focus { outline: none; border-color: var(--accent); }
        
        /* Sub tabs */
        .sub-tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .sub-tab {
            padding: 8px 16px; border-radius: 20px; border: none; background: var(--card-bg);
            color: var(--text-dim); cursor: pointer; font-size: 13px;
        }
        .sub-tab.active { background: var(--accent); color: #000; }
        
        /* Leaderboard */
        .leaderboard-item {
            display: flex; align-items: center; gap: 10px; padding: 10px;
            border-bottom: 1px solid var(--card-border);
        }
        .leaderboard-item .rank { font-family: 'Syne', sans-serif; font-size: 18px; width: 30px; }
        .leaderboard-item .rank.gold { color: #FFD700; }
        .leaderboard-item .rank.silver { color: #C0C0C0; }
        .leaderboard-item .rank.bronze { color: #CD7F32; }
        .leaderboard-item .name { flex: 1; }
        .leaderboard-item .count { color: var(--accent); font-family: 'JetBrains Mono', monospace; }
        
        /* Credit request card */
        .credit-card {
            background: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 12px; padding: 15px; margin-bottom: 10px;
        }
        .credit-card .header { display: flex; justify-content: space-between; align-items: center; }
        .credit-card .matched { color: var(--success); font-size: 12px; }
        .credit-card .unmatched { color: var(--warning); font-size: 12px; }
        .credit-card .actions { display: flex; gap: 10px; margin-top: 10px; }
        
        /* Channel card */
        .channel-card {
            background: linear-gradient(135deg, rgba(112,0,255,0.2), rgba(0,229,255,0.2));
            border: 1px solid var(--card-border); border-radius: 12px; padding: 20px;
            text-align: center;
        }
        .channel-card .channel-name { font-family: 'Syne', sans-serif; font-size: 20px; color: var(--accent); }
        .channel-card .channel-id { color: var(--text-dim); font-size: 12px; margin-top: 5px; }
        .channel-card .actions { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { create } = zustand;

        // --- Store ---
        const useStore = create((set, get) => ({
            activeBotId: null,
            activeGroupId: null,
            activeGroupTitle: "Loading Group...",
            modules: {},
            modulesLoading: {},
            groupSettings: {},
            groupStats: {},
            bots: [],
            groupsByBot: {},
            activeTab: "dashboard",
            groupSelectorOpen: false,

            setActiveTab: (tab) => set({ activeTab: tab }),

            setActiveGroup: (botId, groupId, title) => set({
                activeBotId: botId,
                activeGroupId: groupId,
                activeGroupTitle: title
            }),

            fetchModules: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/modules`);
                    const data = await resp.json();
                    set({ modules: data });
                } catch (err) {
                    console.error("Failed to fetch modules", err);
                }
            },

            toggleModule: async (chatId, moduleName, enabled) => {
                set(state => ({
                    modulesLoading: { ...state.modulesLoading, [moduleName]: true }
                }));

                const oldState = get().modules[moduleName];
                
                // Optimistic update
                set(state => ({
                    modules: { ...state.modules, [moduleName]: enabled }
                }));

                try {
                    const resp = await fetch(`/api/groups/${chatId}/modules/${moduleName}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ enabled })
                    });
                    
                    if (!resp.ok) throw new Error("API call failed");
                } catch (err) {
                    // Revert
                    set(state => ({
                        modules: { ...state.modules, [moduleName]: oldState }
                    }));
                    showToast(`Failed to toggle ${moduleName}`);
                } finally {
                    set(state => ({
                        modulesLoading: { ...state.modulesLoading, [moduleName]: false }
                    }));
                }
            },

            fetchAnalytics: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/analytics`);
                    const data = await resp.json();
                    set({ groupStats: data });
                } catch (err) {}
            },

            fetchHeatmap: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/analytics/heatmap`);
                    const data = await resp.json();
                    set({ heatmapData: data });
                } catch (err) {}
            },

            // Boost config
            boostConfig: {},
            boostStats: {},
            boostLoading: false,

            fetchBoostConfig: async (chatId) => {
                set({ boostLoading: true });
                try {
                    const resp = await fetch(`/api/groups/${chatId}/boost/config`);
                    const data = await resp.json();
                    set({ boostConfig: data });
                } catch (err) {
                    console.error('[BOOST] Fetch config error', err);
                } finally {
                    set({ boostLoading: false });
                }
            },

            saveBoostConfig: async (chatId, config) => {
                set({ boostLoading: true });
                try {
                    const resp = await fetch(`/api/groups/${chatId}/boost/config`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(config)
                    });
                    if (!resp.ok) throw new Error('Save failed');
                    set({ boostConfig: config });
                    showToast('✅ Boost settings saved');
                } catch (err) {
                    console.error('[BOOST] Save error', err);
                    showToast('❌ Failed to save');
                } finally {
                    set({ boostLoading: false });
                }
            },

            fetchBoostStats: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/boost/stats`);
                    const data = await resp.json();
                    set({ boostStats: data });
                } catch (err) {
                    console.error('[BOOST] Fetch stats error', err);
                }
            },

            // Channel gate config
            channelConfig: {},
            channelStats: {},
            channelLoading: false,

            fetchChannelConfig: async (chatId) => {
                set({ channelLoading: true });
                try {
                    const resp = await fetch(`/api/groups/${chatId}/channel-gate/config`);
                    const data = await resp.json();
                    set({ channelConfig: data });
                } catch (err) {
                    console.error('[CHANNEL] Fetch config error', err);
                } finally {
                    set({ channelLoading: false });
                }
            },

            saveChannelConfig: async (chatId, config) => {
                set({ channelLoading: true });
                try {
                    const resp = await fetch(`/api/groups/${chatId}/channel-gate/config`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(config)
                    });
                    if (!resp.ok) throw new Error('Save failed');
                    set({ channelConfig: config });
                    showToast('✅ Channel settings saved');
                } catch (err) {
                    console.error('[CHANNEL] Save error', err);
                    showToast('❌ Failed to save');
                } finally {
                    set({ channelLoading: false });
                }
            },

            fetchChannelStats: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/channel-gate/stats`);
                    const data = await resp.json();
                    set({ channelStats: data });
                } catch (err) {
                    console.error('[CHANNEL] Fetch stats error', err);
                }
            },

            fetchChannelPending: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/channel-gate/pending`);
                    const data = await resp.json();
                    set({ channelPending: data });
                } catch (err) {
                    console.error('[CHANNEL] Fetch pending error', err);
                }
            }
        }));

        function showToast(msg, isSuccess = false) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            if (isSuccess) t.classList.add('success');
            else t.classList.remove('success');
            setTimeout(() => { t.style.display = 'none'; t.classList.remove('success'); }, 3000);
        }

        // --- Components ---

        const LoadingSpinner = () => <div className="loading-spinner"></div>;

        const Toggle = ({ name, description, moduleName }) => {
            const chatId = useStore(state => state.activeGroupId);
            const enabled = useStore(state => state.modules[moduleName] || false);
            const loading = useStore(state => state.modulesLoading[moduleName] || false);
            const toggleModule = useStore(state => state.toggleModule);

            return (
                <div className="toggle-item">
                    <div className="toggle-info">
                        <h4>{name}</h4>
                        <p>{description}</p>
                    </div>
                    <label className="switch">
                        <input 
                            type="checkbox" 
                            checked={enabled} 
                            disabled={loading}
                            onChange={(e) => toggleModule(chatId, moduleName, e.target.checked)}
                        />
                        <span className="slider"></span>
                        {loading && <div style={{position:'absolute', right:'-25px', top:'4px'}}><LoadingSpinner/></div>}
                    </label>
                </div>
            );
        };

        const LineChart = ({ data }) => {
            if (!data || data.length === 0) return <div>No data</div>;
            
            const width = 400;
            const height = 150;
            const padding = 20;

            const maxVal = Math.max(...data.map(d => d.messages), 10);
            const points = data.map((d, i) => {
                const x = (i / (data.length - 1)) * (width - 2 * padding) + padding;
                const y = height - ((d.messages / maxVal) * (height - 2 * padding) + padding);
                return `${x},${y}`;
            }).join(' ');

            const areaPath = `M ${padding},${height-padding} L ${points} L ${width-padding},${height-padding} Z`;

            return (
                <svg viewBox={`0 0 ${width} ${height}`} className="chart">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style={{stopColor:'var(--accent)', stopOpacity:0.3}} />
                            <stop offset="100%" style={{stopColor:'var(--accent)', stopOpacity:0}} />
                        </linearGradient>
                    </defs>
                    <path d={areaPath} fill="url(#grad)" />
                    <polyline
                        fill="none"
                        stroke="var(--accent)"
                        strokeWidth="2"
                        points={points}
                        strokeDasharray="1000"
                        strokeDashoffset="1000"
                    >
                        <animate attributeName="stroke-dashoffset" from="1000" to="0" dur="2s" fill="freeze" />
                    </polyline>
                    {data.map((d, i) => {
                        const x = (i / (data.length - 1)) * (width - 2 * padding) + padding;
                        const y = height - ((d.messages / maxVal) * (height - 2 * padding) + padding);
                        return <circle key={i} cx={x} cy={y} r="3" fill="var(--accent)" />;
                    })}
                </svg>
            );
        };

        const Dashboard = () => {
            const stats = useStore(state => state.groupStats);
            const chatId = useStore(state => state.activeGroupId);
            const fetchAnalytics = useStore(state => state.fetchAnalytics);

            useEffect(() => {
                if (chatId) fetchAnalytics(chatId);
            }, [chatId]);

            return (
                <div>
                    <div className="card">
                        <h3>Message Activity</h3>
                        <div className="chart-container">
                            <LineChart data={stats.activity || []} />
                        </div>
                    </div>
                    <div className="card">
                        <h3>Member Growth</h3>
                        <p>Total: {stats.growth ? stats.growth[stats.growth.length-1]?.total : '...'}</p>
                    </div>
                </div>
            );
        };

        const Modules = () => {
            const categories = {
                "MODERATION": [
                    { id: "warn_system", name: "Warn System", desc: "Track and limit user warnings" },
                    { id: "auto_ban", name: "Auto Ban", desc: "Automatically ban malicious users" },
                    { id: "timed_mute", name: "Timed Mute", desc: "Mute users for a set duration" },
                    { id: "timed_ban", name: "Timed Ban", desc: "Ban users for a set duration" },
                    { id: "silent_mode", name: "Silent Mode", desc: "Send mod logs privately" },
                    { id: "require_reason", name: "Require Reason", desc: "Mandatory reason for mod actions" },
                    { id: "reputation_system", name: "Reputation System", desc: "Community-driven trust" },
                    { id: "trust_score", name: "Trust Score", desc: "Automated behavioral score" },
                    { id: "ai_moderation", name: "AI Moderation", desc: "Intelligent message filtering" }
                ],
                "ANTI-SPAM": [
                    { id: "antiflood", name: "Anti-Flood", desc: "Prevent rapid messaging" },
                    { id: "antispam", name: "Anti-Spam", desc: "Block known spam patterns" },
                    { id: "antilink", name: "Anti-Link", desc: "Control external link sharing" },
                    { id: "anti_forward", name: "Anti-Forward", desc: "Block forwarded messages" },
                    { id: "anti_rtl", name: "Anti-RTL", desc: "Block RTL script messages" },
                    { id: "anti_sticker", name: "Anti-Sticker", desc: "Control sticker usage" },
                    { id: "anti_media", name: "Anti-Media", desc: "Control media uploads" },
                    { id: "anti_bot", name: "Anti-Bot", desc: "Filter automated accounts" }
                ],
                "GREETINGS": [
                    { id: "welcome_message", name: "Welcome Message", desc: "Greet new members" },
                    { id: "goodbye_message", name: "Goodbye Message", desc: "Bid farewell to members" },
                    { id: "welcome_dm", name: "Welcome DM", desc: "Greet new members in private" },
                    { id: "mute_on_join", name: "Mute on Join", desc: "Mute users until verified" },
                    { id: "delete_old_welcome", name: "Delete Old Welcome", desc: "Keep group chat clean" },
                    { id: "auto_delete_welcome", name: "Auto-Delete Welcome", desc: "Remove greetings after timer" }
                ],
                "SECURITY": [
                    { id: "captcha", name: "Captcha", desc: "Verify new users are human" },
                    { id: "anti_raid", name: "Anti-Raid", desc: "Protection during raid events" },
                    { id: "global_ban_sync", name: "Global Ban Sync", desc: "Sync with Nexus global blacklist" },
                    { id: "new_account_filter", name: "New Account Filter", desc: "Restrict fresh accounts" },
                    { id: "suspicious_activity_alert", name: "Suspicious Activity", desc: "Alert on unusual patterns" }
                ],
                "CONTENT": [
                    { id: "word_filter", name: "Word Filter", desc: "Filter prohibited words" },
                    { id: "link_whitelist", name: "Link Whitelist", desc: "Allow specific domains" },
                    { id: "media_whitelist", name: "Media Whitelist", desc: "Allow specific media types" },
                    { id: "spoiler_filter", name: "Spoiler Filter", desc: "Filter unmasked spoilers" },
                    { id: "translation_filter", name: "Translation Filter", desc: "Enforce specific languages" }
                ],
                "CHANNEL": [
                    { id: "auto_post", name: "Auto Post", desc: "Mirror group activity to channel" },
                    { id: "scheduled_posts", name: "Scheduled Posts", desc: "Manage future channel updates" },
                    { id: "post_to_channel", name: "Post to Channel", desc: "Direct bot-to-channel posting" },
                    { id: "channel_comments_mod", name: "Channel Comments", desc: "Moderate linked comments" },
                    { id: "linked_channel_sync", name: "Linked Channel Sync", desc: "Sync group/channel admins" },
                    { id: "post_approval", name: "Post Approval", desc: "Approve group msgs for channel" }
                ],
                "ANALYTICS": [
                    { id: "activity_tracking", name: "Activity Tracking", desc: "Detailed group stats" },
                    { id: "sentiment_analysis", name: "Sentiment Analysis", desc: "Track community mood" },
                    { id: "growth_tracking", name: "Growth Tracking", desc: "Monitor member changes" },
                    { id: "member_heatmap", name: "Member Heatmap", desc: "Peak activity visualization" }
                ],
                "UTILITIES": [
                    { id: "rules_command", name: "Rules Command", desc: "Quick access to group rules" },

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // ZUSTAND STORE
        const useStore = create((set, get) => ({
            userContext: { user: null, role: null, adminGroups: [], modGroups: [], memberGroups: [], botInfo: null, supportGroup: null, isLoading: true, error: null },
            memberStats: {}, memberRankings: {}, memberInviteLinks: {},
            activeBotId: null, activeGroupId: null, activeGroupTitle: "Loading Group...",
            modules: {}, modulesLoading: {}, groupSettings: {}, groupStats: {},
            activeTab: "dashboard", groupSelectorOpen: false,
            boostConfig: {}, boostStats: {}, boostLoading: false,
            channelConfig: {}, channelStats: {}, channelLoading: false,

            setUserContext: (context) => set({ userContext: { ...get().userContext, ...context, isLoading: false, error: null } }),
            setUserError: (err) => set(state => ({ userContext: { ...state.userContext, error: err, isLoading: false } })),

            fetchUserContext: async (initData) => {
                try {
                    const resp = await fetch('/api/me', { headers: { 'X-Telegram-Init-Data': initData } });
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const data = await resp.json();
                    set({
                        userContext: {
                            user: data.user, role: data.role, adminGroups: data.admin_groups || [],
                            modGroups: data.mod_groups || [], memberGroups: data.member_groups || [],
                            botInfo: data.bot_info, supportGroup: data.support_group, isLoading: false, error: null
                        }
                    });
                    return data;
                } catch (err) {
                    set(state => ({ userContext: { ...state.userContext, error: err.message, isLoading: false } }));
                    throw err;
                }
            },

            fetchMemberStats: async (chatId, initData) => {
                try {
                    const resp = await fetch(`/api/me/groups/${chatId}/stats`, { headers: { 'X-Telegram-Init-Data': initData } });
                    const data = await resp.json();
                    set(state => ({ memberStats: { ...state.memberStats, [chatId]: data } }));
                } catch (err) { console.error('[STORE] Failed to fetch member stats:', err); }
            },

            fetchMemberRankings: async (chatId, type = 'boost', page = 1, initData) => {
                try {
                    const resp = await fetch(`/api/me/groups/${chatId}/rankings?type=${type}&page=${page}`, { headers: { 'X-Telegram-Init-Data': initData } });
                    const data = await resp.json();
                    set(state => ({ memberRankings: { ...state.memberRankings, [`${chatId}-${type}`]: data } }));
                } catch (err) { console.error('[STORE] Failed to fetch rankings:', err); }
            },

            fetchMemberInviteLink: async (chatId, initData) => {
                try {
                    const resp = await fetch(`/api/me/groups/${chatId}/invitelink`, { headers: { 'X-Telegram-Init-Data': initData } });
                    const data = await resp.json();
                    set(state => ({ memberInviteLinks: { ...state.memberInviteLinks, [chatId]: data } }));
                } catch (err) { console.error('[STORE] Failed to fetch invite link:', err); }
            },

            setActiveTab: (tab) => set({ activeTab: tab }),
            setActiveGroup: (botId, groupId, title) => set({ activeBotId: botId, activeGroupId: groupId, activeGroupTitle: title }),

            fetchModules: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/modules`);
                    const data = await resp.json();
                    set({ modules: data });
                } catch (err) { console.error("Failed to fetch modules", err); }
            },

            toggleModule: async (chatId, moduleName, enabled) => {
                set(state => ({ modulesLoading: { ...state.modulesLoading, [moduleName]: true } }));
                const oldState = get().modules[moduleName];
                set(state => ({ modules: { ...state.modules, [moduleName]: enabled } }));
                try {
                    const resp = await fetch(`/api/groups/${chatId}/modules/${moduleName}`, {
                        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ enabled })
                    });
                    if (!resp.ok) throw new Error("API call failed");
                } catch (err) {
                    set(state => ({ modules: { ...state.modules, [moduleName]: oldState } }));
                    showToast(`Failed to toggle ${moduleName}`);
                } finally {
                    set(state => ({ modulesLoading: { ...state.modulesLoading, [moduleName]: false } }));
                }
            },

            fetchAnalytics: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/analytics`);
                    const data = await resp.json();
                    set({ groupStats: data });
                } catch (err) {}
            },

            fetchBoostConfig: async (chatId) => {
                set({ boostLoading: true });
                try {
                    const resp = await fetch(`/api/groups/${chatId}/boost/config`);
                    const data = await resp.json();
                    set({ boostConfig: data });
                } finally { set({ boostLoading: false }); }
            },

            saveBoostConfig: async (chatId, config) => {
                set({ boostLoading: true });
                try {
                    await fetch(`/api/groups/${chatId}/boost/config`, {
                        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(config)
                    });
                    set({ boostConfig: config });
                    showToast('✅ Boost settings saved');
                } finally { set({ boostLoading: false }); }
            },

            fetchBoostStats: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/boost/stats`);
                    const data = await resp.json();
                    set({ boostStats: data });
                } catch (err) {}
            },

            fetchChannelConfig: async (chatId) => {
                set({ channelLoading: true });
                try {
                    const resp = await fetch(`/api/groups/${chatId}/channel-gate/config`);
                    const data = await resp.json();
                    set({ channelConfig: data });
                } finally { set({ channelLoading: false }); }
            },

            saveChannelConfig: async (chatId, config) => {
                set({ channelLoading: true });
                try {
                    await fetch(`/api/groups/${chatId}/channel-gate/config`, {
                        method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(config)
                    });
                    set({ channelConfig: config });
                    showToast('✅ Channel settings saved');
                } finally { set({ channelLoading: false }); }
            },

            fetchChannelStats: async (chatId) => {
                try {
                    const resp = await fetch(`/api/groups/${chatId}/channel-gate/stats`);
                    const data = await resp.json();
                    set({ channelStats: data });
                } catch (err) {}
            }
        }));

        function showToast(msg, isSuccess = false) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            if (isSuccess) t.classList.add('success'); else t.classList.remove('success');
            setTimeout(() => { t.style.display = 'none'; t.classList.remove('success'); }, 3000);
        }

        // Loading Screen
        const LoadingScreen = ({ subtext }) => (
            <div className="loading-screen">
                <div className="loading-logo">⚡</div>
                <div className="loading-text">Loading your profile...</div>
                <div className="spinner"></div>
                {subtext && <div className="loading-subtext">{subtext}</div>}
            </div>
        );

        // Error Screen
        const ErrorScreen = ({ icon, title, message, onRetry }) => (
            <div className="error-screen">
                <div className="error-icon">{icon}</div>
                <div className="error-title">{title}</div>
                <div className="error-message">{message}</div>
                {onRetry && <button className="error-action" onClick={onRetry}>🔄 Try Again</button>}
            </div>
        );

        // Stranger/Onboarding Screen
        const StrangerScreen = ({ user, botInfo, onRefresh }) => {
            const botUsername = botInfo?.username || 'NexusBot';
            const botFirstName = botInfo?.first_name || 'Nexus';
            const firstName = user?.first_name || 'there';

            const handleAddToGroup = () => {
                const tg = window.Telegram?.WebApp;
                if (tg) tg.openLink(`https://t.me/${botUsername}?startgroup=true`);
            };

            return (
                <div className="onboarding-container">
                    <div className="onboarding-logo">
                        <div className="logo-icon">⚡</div>
                        <h1>{botFirstName}</h1>
                        <p>Intelligent Group Management</p>
                    </div>
                    <div className="onboarding-section">
                        <p style={{fontSize: '16px', textAlign: 'center'}}>Hey <strong>{firstName}</strong>! 👋</p>
                        <p style={{fontSize: '14px', color: 'var(--text-dim)', textAlign: 'center', marginTop: '10px'}}>
                            You're not in any groups managed by {botFirstName} yet.
                        </p>
                    </div>
                    <div className="onboarding-section">
                        <h3>If you're a GROUP ADMIN:</h3>
                        <div className="steps-box">
                            <div className="step-item"><div className="step-number">1</div><div className="step-text">Add @{botUsername} to your group</div></div>
                            <div className="step-item"><div className="step-number">2</div><div className="step-text">Make it an administrator</div></div>
                            <div className="step-item"><div className="step-number">3</div><div className="step-text">Send /start in the group</div></div>
                            <div className="step-item"><div className="step-number">4</div><div className="step-text">Come back here!</div></div>
                        </div>
                    </div>
                    <button className="btn-full btn-primary" onClick={handleAddToGroup}>➕ Add {botFirstName} to My Group</button>
                    <div className="onboarding-section" style={{marginTop: '30px'}}>
                        <h3>If you're a GROUP MEMBER:</h3>
                        <p style={{fontSize: '14px', color: 'var(--text-dim)', lineHeight: '1.6'}}>
                            Ask your group admin to add {botFirstName}. This panel will show your stats, boost progress, and rankings.
                        </p>
                    </div>
                    <div className="onboarding-section">
                        <h3>What {botFirstName} does:</h3>
                        <div className="features-grid">
                            <div className="feature-item">🛡️ Advanced moderation</div>
                            <div className="feature-item">⚡ Member boost system</div>
                            <div className="feature-item">📢 Channel verification</div>
                            <div className="feature-item">📊 Analytics & insights</div>
                            <div className="feature-item">🤖 41+ modules</div>
                            <div className="feature-item">🔒 Anti-spam protection</div>
                        </div>
                    </div>
                    <button className="btn-full btn-secondary btn-refresh" onClick={onRefresh}>🔄 Refresh — I just joined a group</button>
                </div>
            );
        };

        // Member Group Card
        const MemberGroupCard = ({ group, inviteLink, onShare, onCopy }) => {
            let accentClass = 'card-accent-cyan';
            if (group.boost_status?.enabled && !group.boost_status?.is_unlocked) accentClass = 'card-accent-amber';
            if (group.channel_status?.enabled && !group.channel_status?.is_verified) accentClass = 'card-accent-amber';
            if (group.warn_status?.count > 0) accentClass = 'card-accent-red';

            const renderProgress = (current, required, style = 'blocks') => {
                const filled = Math.min(Math.floor((current / required) * required), required);
                const empty = required - filled;
                if (style === 'dots') return '●'.repeat(filled) + '○'.repeat(empty);
                if (style === 'emoji') return '🟩'.repeat(filled) + '⬜'.repeat(empty);
                if (style === 'numbers') return `${current}/${required}`;
                return '█'.repeat(filled) + '░'.repeat(empty);
            };

            const trustColor = (score) => score <= 30 ? 'red' : score <= 60 ? 'amber' : score <= 85 ? 'cyan' : 'green';

            return (
                <div className={`card member-group-card ${accentClass}`}>
                    <div className="group-header">
                        <div className="group-avatar">💬</div>
                        <div className="group-info">
                            <h3>{group.title}</h3>
                            <span>{(group.member_count || 0).toLocaleString()} members</span>
                        </div>
                    </div>
                    {group.boost_status?.enabled && (
                        <div className="stat-row">
                            <div className="stat-label"><span>⚡</span> Boost Progress</div>
                            <div className="stat-value">
                                {group.boost_status.is_unlocked ? (
                                    <span style={{color: 'var(--success)'}}>✅ Complete!</span>
                                ) : (
                                    <span>{renderProgress(group.boost_status.current, group.boost_status.required, group.boost_status.progress_style)}</span>
                                )}
                            </div>
                        </div>
                    )}
                    {group.boost_status?.enabled && !group.boost_status.is_unlocked && (
                        <div className="stat-row" style={{flexDirection: 'column', alignItems: 'flex-start', gap: '8px'}}>
                            <div style={{fontSize: '12px', color: 'var(--text-dim)'}}>
                                {group.boost_status.required - group.boost_status.current} more invite needed
                            </div>
                            {inviteLink?.invite_link && (
                                <div className="btn-group">
                                    <span style={{fontSize: '12px', wordBreak: 'break-all'}}>{inviteLink.invite_link}</span>
                                    <button className="btn-small btn-primary" onClick={onShare}>📤 Share</button>
                                    <button className="btn-small btn-secondary" onClick={onCopy}>📋 Copy</button>
                                </div>
                            )}
                        </div>
                    )}
                    {group.channel_status?.enabled && (
                        <div className="stat-row">
                            <div className="stat-label"><span>📢</span> Channel</div>
                            <div className="stat-value">
                                {group.channel_status.is_verified ? (
                                    <span style={{color: 'var(--success)'}}>✅ Verified</span>
                                ) : (
                                    <>
                                        <span style={{color: 'var(--amber)'}}>⚠️ Not verified</span>
                                        {group.channel_status.channel_invite && (
                                            <button className="btn-small btn-primary" style={{marginLeft: '8px'}}
                                                onClick={() => window.Telegram?.WebApp?.openLink(`https://${group.channel_status.channel_invite}`)}>
                                                Join
                                            </button>
                                        )}
                                    </>
                                )}
                            </div>
                        </div>
                    )}
                    <div className="stat-row">
                        <div className="stat-label"><span>⚠️</span> Warnings</div>
                        <div className="stat-value">{group.warn_status.count} / {group.warn_status.limit}</div>
                    </div>
                    <div className="stat-row">
                        <div className="stat-label"><span>⭐</span> Trust Score</div>
                        <div className="stat-value">
                            <span className={`rank-badge ${trustColor(group.trust_score)}`}>{group.trust_score} / 100</span>
                        </div>
                    </div>
                </div>
            );
        };

        // Member Home
        const MemberHome = ({ memberGroups, initData }) => {
            const { fetchMemberInviteLink, memberInviteLinks } = useStore.getState();

            const handleShare = (link) => {
                const tg = window.Telegram?.WebApp;
                if (tg?.switchInlineQuery) tg.switchInlineQuery(link);
                else { navigator.clipboard.writeText(link); showToast('📋 Link copied'); }
            };

            const handleCopy = (link) => { navigator.clipboard.writeText(link); showToast('📋 Link copied'); };

            return (
                <div>
                    <h2 style={{marginBottom: '20px'}}>Your Groups ({memberGroups.length})</h2>
                    {memberGroups.map(group => (
                        <MemberGroupCard key={group.chat_id} group={group}
                            inviteLink={memberInviteLinks[group.chat_id]}
                            onShare={() => memberInviteLinks[group.chat_id]?.invite_link && handleShare(memberInviteLinks[group.chat_id].invite_link)}
                            onCopy={() => memberInviteLinks[group.chat_id]?.invite_link && handleCopy(memberInviteLinks[group.chat_id].invite_link)}
                        />
                    ))}
                </div>
            );
        };

        // Member Stats
        const MemberStats = ({ memberGroups, initData }) => {
            const [selectedGroup, setSelectedGroup] = useState(memberGroups[0]?.chat_id);
            const { fetchMemberStats, memberStats } = useStore.getState();

            useEffect(() => { if (selectedGroup) fetchMemberStats(selectedGroup, initData); }, [selectedGroup]);

            const stats = memberStats[selectedGroup];

            return (
                <div>
                    <h2 style={{marginBottom: '20px'}}>📊 My Stats</h2>
                    <div className="card" style={{marginBottom: '20px'}}>
                        <select className="input-field" value={selectedGroup} onChange={(e) => setSelectedGroup(Number(e.target.value))}>
                            {memberGroups.map(g => <option key={g.chat_id} value={g.chat_id}>{g.title}</option>)}
                        </select>
                    </div>
                    {stats && (
                        <>
                            <div className="stats-grid">
                                <div className="stat-card"><div className="value">{stats.invited_count}</div><div className="label">👥 Invited</div></div>
                                <div className="stat-card"><div className="value">{stats.message_count}</div><div className="label">💬 Messages</div></div>
                                <div className="stat-card"><div className="value">{stats.trust_score}</div><div className="label">⭐ Trust</div></div>
                            </div>
                            {stats.warn_count > 0 ? (
                                <div className="card" style={{borderLeft: '4px solid var(--red)'}}>
                                    <h4>⚠️ Warn History</h4>
                                    {stats.warns.map((warn, i) => (
                                        <div key={i} style={{padding: '8px 0', borderBottom: '1px solid var(--card-border)'}}>
                                            <div style={{fontSize: '13px'}}>{warn.reason || 'No reason'}</div>
                                            <div style={{fontSize: '11px', color: 'var(--text-dim)'}}>{new Date(warn.timestamp).toLocaleDateString()}</div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="card">
                                    <h4>⚠️ My Warn History</h4>
                                    <p style={{color: 'var(--success)'}}>No warnings — clean record ✅</p>
                                </div>
                            )}
                            <div className="card">
                                <h4>📅 Activity (last 7 days)</h4>
                                <div style={{padding: '20px', textAlign: 'center', color: 'var(--text-dim)'}}>Activity tracking coming soon</div>
                            </div>
                        </>
                    )}
                </div>
            );
        };

        // Member Rank
        const MemberRank = ({ memberGroups, initData }) => {
            const [selectedGroup, setSelectedGroup] = useState(memberGroups[0]?.chat_id);
            const [rankType, setRankType] = useState('boost');
            const { fetchMemberRankings, memberRankings } = useStore.getState();

            useEffect(() => { if (selectedGroup) fetchMemberRankings(selectedGroup, rankType, 1, initData); }, [selectedGroup, rankType]);

            const rankings = memberRankings[`${selectedGroup}-${rankType}`];

            return (
                <div>
                    <h2 style={{marginBottom: '20px'}}>🏆 Leaderboard</h2>
                    <div className="card" style={{marginBottom: '20px'}}>
                        <select className="input-field" style={{marginBottom: '10px'}} value={selectedGroup} onChange={(e) => setSelectedGroup(Number(e.target.value))}>
                            {memberGroups.map(g => <option key={g.chat_id} value={g.chat_id}>{g.title}</option>)}
                        </select>
                    </div>
                    <div className="sub-tabs" style={{marginBottom: '20px'}}>
                        <button className={`sub-tab ${rankType === 'boost' ? 'active' : ''}`} onClick={() => setRankType('boost')}>Boost Rank</button>
                        <button className={`sub-tab ${rankType === 'trust' ? 'active' : ''}`} onClick={() => setRankType('trust')}>Trust Score</button>
                        <button className={`sub-tab ${rankType === 'messages' ? 'active' : ''}`} onClick={() => setRankType('messages')}>Messages</button>
                    </div>
                    {rankings && (
                        <div className="card">
                            {rankings.leaderboard.map((entry) => (
                                <div key={entry.user_id} className={`leaderboard-item ${entry.is_you ? 'you' : ''}`}>
                                    <span className={`rank ${entry.rank === 1 ? 'gold' : entry.rank === 2 ? 'silver' : entry.rank === 3 ? 'bronze' : ''}`}>{entry.rank}</span>
                                    <span className="name">@{entry.username || entry.first_name || 'Unknown'} {entry.is_you && <span style={{marginLeft: '8px', color: 'var(--accent)'}}>(You)</span>}</span>
                                    <span className="count">{entry.value}</span>
                                </div>
                            ))}
                            {rankings.you.rank > 10 && (
                                <>
                                    <div style={{textAlign: 'center', padding: '10px', color: 'var(--text-dim)'}}>...</div>
                                    <div className="leaderboard-item you">
                                        <span className="rank">{rankings.you.rank}</span>
                                        <span className="name">You</span>
                                        <span className="count">{rankings.you.value}</span>
                                    </div>
                                </>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // Member Profile
        const MemberProfile = ({ user, memberGroups, onRefresh }) => {
            const handleCopy = (link) => { navigator.clipboard.writeText(link); showToast('📋 Link copied'); };

            return (
                <div>
                    <h2 style={{marginBottom: '20px'}}>👤 Profile</h2>
                    <div className="card" style={{textAlign: 'center', padding: '30px'}}>
                        <div style={{width: '80px', height: '80px', borderRadius: '50%', background: 'linear-gradient(135deg, var(--accent), var(--secondary))', margin: '0 auto 15px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '32px'}}>
                            {user?.first_name?.[0] || '?'}
                        </div>
                        <h3 style={{margin: '0 0 5px'}}>{user?.first_name} {user?.last_name || ''}</h3>
                        {user?.username && <p style={{margin: '0 0 5px', color: 'var(--accent)'}}>@{user.username}</p>}
                        <p style={{margin: 0, fontSize: '12px', color: 'var(--text-dim)'}}>ID: {user?.id}</p>
                    </div>
                    <div className="card">
                        <h4>🔗 My Invite Links</h4>
                        {memberGroups.map(group => (
                            <div key={group.chat_id} style={{padding: '12px 0', borderBottom: '1px solid var(--card-border)'}}>
                                <div style={{fontWeight: 600, marginBottom: '5px'}}>{group.title}</div>
                                {group.boost_status?.invite_link ? (
                                    <div className="btn-group" style={{flexWrap: 'wrap'}}>
                                        <span style={{fontSize: '12px', wordBreak: 'break-all'}}>{group.boost_status.invite_link}</span>
                                        <button className="btn-small btn-secondary" onClick={() => handleCopy(group.boost_status.invite_link)}>📋 Copy</button>
                                    </div>
                                ) : <span style={{fontSize: '12px', color: 'var(--text-dim)'}}>No invite link yet</span>}
                            </div>
                        ))}
                    </div>
                    <button className="btn-full btn-secondary" onClick={onRefresh}>🔄 Refresh Data</button>
                </div>
            );
        };

        // Member App
        const MemberApp = ({ context, initData, onRefresh }) => {
            const [activeTab, setActiveTab] = useState('home');
            const { user, memberGroups } = context;

            useEffect(() => {
                const { fetchMemberInviteLink } = useStore.getState();
                memberGroups.forEach(group => { if (group.boost_status?.enabled) fetchMemberInviteLink(group.chat_id, initData); });
            }, []);

            const renderContent = () => {
                switch(activeTab) {
                    case 'home': return <MemberHome memberGroups={memberGroups} initData={initData} />;
                    case 'stats': return <MemberStats memberGroups={memberGroups} initData={initData} />;
                    case 'rank': return <MemberRank memberGroups={memberGroups} initData={initData} />;
                    case 'profile': return <MemberProfile user={user} memberGroups={memberGroups} onRefresh={onRefresh} />;
                    default: return <MemberHome memberGroups={memberGroups} initData={initData} />;
                }
            };

            return (
                <React.Fragment>
                    <div className="main-content">
                        <div className="header" style={{display: window.innerWidth > 768 ? 'none' : 'block'}}>
                            <h1>⚡ Nexus</h1>
                            <p>Hey, {user?.first_name || 'there'}! 👋</p>
                        </div>
                        {renderContent()}
                    </div>
                    <div className="tab-nav">
                        <div className={`tab-item ${activeTab==='home'?'active':''}`} onClick={() => setActiveTab('home')}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span>Home</span>
                        </div>
                        <div className={`tab-item ${activeTab==='stats'?'active':''}`} onClick={() => setActiveTab('stats')}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg><span>Stats</span>
                        </div>
                        <div className={`tab-item ${activeTab==='rank'?'active':''}`} onClick={() => setActiveTab('rank')}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/></svg><span>Rank</span>

            const points = data.map((d, i) => {
                const x = (i / (data.length - 1)) * (width - 2 * padding) + padding;
                const y = height - ((d.messages / maxVal) * (height - 2 * padding) + padding);
                return `${x},${y}`;
            }).join(' ');
            const areaPath = `M ${padding},${height-padding} L ${points} L ${width-padding},${height-padding} Z`;

            return (
                <svg viewBox={`0 0 ${width} ${height}`}>

            if (userContext.error) return <ErrorScreen icon="⚠️" title="Something went wrong" message={userContext.error} onRetry={initApp} />;
            if (!initData && !skipAuth) return <ErrorScreen icon="🔒" title="Open in Telegram" message="This app must be opened through the Nexus bot in Telegram." />;

            const role = userContext.role;
            switch (role) {
                case 'owner':
                case 'admin': return <AdminApp context={userContext} />;
                case 'member': return <MemberApp context={userContext} initData={initData} onRefresh={initApp} />;
                case 'stranger':
                default: return <StrangerScreen user={userContext.user} botInfo={userContext.botInfo} onRefresh={initApp} />;
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
